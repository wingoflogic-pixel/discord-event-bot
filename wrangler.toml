name = "discord-event-bot"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# --- D1 データベース ---
# database_id は `wrangler d1 create choiemu-event-bot-db` 実行後に出力される値を貼り付ける。
[[d1_databases]]
binding = "DB"
database_name = "choiemu-event-bot-db"
database_id = "f6ff753c-bf29-4eb5-83ec-317631743cfc"
migrations_dir = "migrations"

# --- 日次 cron（UTC基準。0 12 * * * = JST 21:00）---
[triggers]
crons = ["0 12 * * *"]

# --- 管理UI（静的アセット）---
# ui/ ディレクトリを SPA として配信。env.ASSETS でプログラムからも参照可能。
[assets]
directory = "./ui"
binding = "ASSETS"
not_found_handling = "single-page-application"

# シークレットは wrangler secret put で設定（コミットしない）:
#   DISCORD_PUBLIC_KEY / DISCORD_APPLICATION_ID / DISCORD_BOT_TOKEN / ADMIN_TOKEN
# ※ 投稿チャンネルは Notification ごとに DB で持つため、単一の DISCORD_CHANNEL_ID は廃止。
# ※ D1 の database_name は旧名のまま（リネームは運用切替時に再作成して反映）。
