<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EventBot 管理</title>
    <style>
      /* ===== design-system/styles/tokens.css ===== */
      /* =============================================================
       * EventBot Design System — Design Tokens（単一の真実 / source of truth）
       * Discord 2025 Q1 リフレッシュ準拠のモダンダークテーマ。
       * ============================================================= */
      :root {
        /* --- 背景・面 (surfaces) --- */
        --bg: #111214;
        --panel: #1e1f22;
        --panel2: #2b2d31;
        --elevated: #313338;
      
        /* --- 境界線 (borders) --- */
        --border: #3f4147;
        --border2: #484b52;
        --border-hover: #4e5058;
      
        /* --- テキスト --- */
        --text: #dbdee1;
        --muted: #b5bac1;
        --text-placeholder: #87898c;
      
        /* --- アクセント (Discord blurple 系) --- */
        --accent: #5865f2;
        --accent-hover: #4752c4;
        --accent-soft: rgba(88, 101, 242, .15);
      
        /* --- 状態色 (semantic) --- */
        --danger: #f23f43;
        --danger-hover: #da373c;
        --ok: #23a559;
        --warn: #f0b232;
      
        /* --- ボタン hover (darken パターン) --- */
        --btn-secondary-hover: #3a3c41;
        --btn-danger-hover: #a12d31;
      
        /* --- コンポーネント固有テキスト --- */
        --pill-ok-text: #2dc770;
        --nav-active-text: #f2f3f5;
        --avatar-text: #c9cdfb;
      
        /* --- オーバーレイ --- */
        --backdrop: rgba(0, 0, 0, .7);
      
        /* --- フォーカスリング --- */
        --ring: 0 0 0 2px rgba(88, 101, 242, .4);
      
        /* --- 角丸・影・余白 --- */
        --r: 8px;
        --r-sm: 4px;
        --r-lg: 12px;
        --shadow: 0 8px 16px rgba(0, 0, 0, .24);
        --sp: 12px;
      }

      /* ===== design-system/styles/components.css ===== */
      /* =============================================================
       * EventBot Design System — Base & Components
       * 構造は ui/index.html のインライン <style> 由来。色・角丸は
       * tokens.css（Discord 2025 ダーク）の var(--*) に全面配線。
       * index.css 経由で読み込む。
       * ============================================================= */
      
      /* ---------- Reset / Base ---------- */
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        font-size: 14px; line-height: 1.55; -webkit-font-smoothing: antialiased;
      }
      h1 { font-size: 19px; }
      h2 { font-size: 17px; margin: 0 0 4px; }
      h3 { font-size: 15px; margin: 0 0 8px; }
      a { color: var(--accent); }
      code { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px; font-size: 12.5px; }
      
      /* ---------- Form controls ---------- */
      label { display: block; color: var(--muted); margin: 12px 0 5px; font-size: 12.5px; font-weight: 600; letter-spacing: .01em; }
      input, select, textarea {
        width: 100%; padding: 9px 11px; background: var(--panel);
        border: 1px solid var(--border2); border-radius: var(--r-sm); color: var(--text);
        color-scheme: dark; /* ネイティブの日付/時刻ピッカーのアイコン・カレンダーを暗背景向けに明色化 */
        font-family: inherit; font-size: 14px; transition: border-color .17s ease, box-shadow .17s ease, background .17s ease;
      }
      input:hover, select:hover, textarea:hover { border-color: var(--border-hover); }
      input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: var(--ring); }
      input.invalid, select.invalid, textarea.invalid { border-color: var(--danger); box-shadow: 0 0 0 2px color-mix(in srgb, var(--danger) 40%, transparent); }
      ::placeholder { color: var(--text-placeholder); }
      .field-error { color: var(--danger); font-size: 12px; margin-top: 4px; min-height: 0; }
      label.inline { display: inline-flex; align-items: center; gap: 8px; margin: 8px 14px 0 0; color: var(--text); font-weight: 500; cursor: pointer; }
      label.inline input { width: auto; accent-color: var(--accent); }
      
      /* ---------- Buttons ---------- */
      button.btn {
        background: var(--accent); color: #fff; border: 1px solid transparent;
        padding: 9px 16px; border-radius: var(--r-sm); cursor: pointer; font-size: 14px; font-weight: 600;
        font-family: inherit; line-height: 1.2; transition: background .17s ease, border-color .17s ease, transform .04s, opacity .17s ease;
        display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
      }
      button.btn:hover { background: var(--accent-hover); }
      button.btn:active { transform: translateY(1px); }
      button.btn:focus-visible { outline: none; box-shadow: var(--ring); }
      button.btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
      button.btn.secondary { background: var(--elevated); color: var(--text); border-color: var(--border2); }
      button.btn.secondary:hover { background: var(--btn-secondary-hover); }
      button.btn.danger { background: var(--danger); }
      button.btn.danger:hover { background: var(--btn-danger-hover); }
      button.btn.ghost { background: rgba(255, 255, 255, .04); border: 1px solid transparent; color: var(--muted); }
      button.btn.ghost:hover { background: rgba(255, 255, 255, .09); color: var(--text); }
      button.btn.ghost.danger { background: rgba(255, 255, 255, .04); border-color: transparent; color: var(--muted); }
      button.btn.ghost.danger:hover { background: color-mix(in srgb, var(--danger) 16%, transparent); border-color: transparent; color: var(--danger); }
      button.btn.sm { padding: 5px 11px; font-size: 13px; }
      button.btn.xs { padding: 3px 8px; font-size: 12px; border-radius: 6px; }
      button.btn.busy { position: relative; color: transparent !important; pointer-events: none; }
      button.btn.busy::after {
        content: ""; position: absolute; inset: 0; margin: auto; width: 14px; height: 14px;
        border: 2px solid rgba(255, 255, 255, .5); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      /* ---------- Table ---------- */
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
      th { color: var(--muted); font-weight: 600; font-size: 12.5px; }
      tbody tr:hover { background: rgba(255, 255, 255, .04); }
      .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--r-sm); }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp); }
      .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--sp); }
      
      /* ---------- Feedback: toast / pill / summary / empty ---------- */
      .toast {
        position: fixed; bottom: 20px; right: 20px; padding: 12px 16px; border-radius: var(--r-sm);
        background: var(--ok); color: #fff; opacity: 0; transform: translateY(8px);
        transition: opacity .2s, transform .2s; pointer-events: none; max-width: min(60vw, 420px); z-index: 60; box-shadow: var(--shadow); font-weight: 500;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast.err { background: var(--danger); }
      .pill { display: inline-block; padding: 1px 7px; border-radius: var(--r-sm); font-size: 11px; font-weight: 600; border: 1px solid transparent; background: rgba(255, 255, 255, .06); color: var(--muted); }
      .pill.on { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--pill-ok-text); border-color: color-mix(in srgb, var(--ok) 40%, transparent); }
      .pill.off { background: rgba(255, 255, 255, .05); color: var(--muted); }
      .summary {
        display: flex; align-items: center; gap: 8px; padding: 11px 13px; margin: 14px 0;
        background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: var(--r-sm); font-size: 14px; font-weight: 500;
      }
      .empty {
        text-align: center; color: var(--muted); padding: 28px 16px; border: 1px dashed var(--border2);
        border-radius: var(--r); background: var(--panel);
      }
      
      /* ---------- Settings patterns (Discord 設定画面風) ---------- */
      /* Switch (トグル) */
      .switch { position: relative; display: inline-flex; flex: none; width: 40px; height: 24px; cursor: pointer; }
      .switch input { position: absolute; inset: 0; opacity: 0; margin: 0; cursor: pointer; }
      .switch-slider { position: absolute; inset: 0; background: var(--border2); border-radius: 999px; transition: background .15s ease; }
      .switch-slider::before { content: ""; position: absolute; top: 4px; left: 4px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .15s ease; }
      .switch input:checked + .switch-slider { background: var(--accent); }
      .switch input:checked + .switch-slider::before { transform: translateX(16px); }
      .switch input:focus-visible + .switch-slider { box-shadow: var(--ring); }
      .switch input:disabled + .switch-slider { opacity: .5; cursor: not-allowed; }
      
      /* Radio (タイトル＋説明つき) */
      .radio-group { display: flex; flex-direction: column; gap: 2px; }
      .radio-option { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; cursor: pointer; }
      .radio-option > input { position: absolute; opacity: 0; width: 0; height: 0; }
      .radio-mark { flex: none; width: 20px; height: 20px; margin-top: 1px; border-radius: 50%; border: 2px solid var(--border-hover); position: relative; transition: border-color .15s ease; }
      .radio-option > input:checked + .radio-mark { border-color: var(--accent); }
      .radio-option > input:checked + .radio-mark::after { content: ""; position: absolute; inset: 4px; border-radius: 50%; background: var(--accent); }
      .radio-option > input:focus-visible + .radio-mark { box-shadow: var(--ring); }
      .radio-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .radio-title { color: var(--text); font-weight: 600; font-size: 14px; }
      .radio-desc { color: var(--muted); font-size: 12.5px; }
      
      /* SettingRow (ラベル＋説明 / 右にコントロール) */
      .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
      .setting-row:last-child { border-bottom: none; }
      .setting-row-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .setting-row-title { color: var(--text); font-weight: 600; font-size: 14px; }
      .setting-row-desc { color: var(--muted); font-size: 12.5px; }
      .setting-row-control { flex: none; display: flex; align-items: center; gap: 8px; }
      
      /* NavRow (アイコン＋タイトル＋説明＋シェブロンの遷移行) */
      .nav-row { display: flex; align-items: center; gap: 12px; padding: 13px 8px; cursor: pointer; border-radius: var(--r-sm); transition: background .12s ease; }
      .nav-row:hover { background: var(--panel2); }
      .nav-row:focus-visible { outline: none; box-shadow: var(--ring); }
      .nav-row-icon { flex: none; display: flex; color: var(--muted); }
      .nav-row-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
      .nav-row-title { color: var(--text); font-weight: 600; font-size: 14px; }
      .nav-row-desc { color: var(--muted); font-size: 12.5px; }
      .nav-row-chevron { flex: none; color: var(--muted); font-size: 18px; line-height: 1; }
      
      /* Divider (汎用の区切り線) */
      .divider { height: 1px; border: none; background: var(--border); margin: 16px 0; }
      
      /* Alert (情報/警告/危険のコールアウト) */
      .alert { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; border-radius: 0 var(--r-sm) var(--r-sm) 0; font-size: 13.5px; color: var(--text); border: none; border-left: 3px solid color-mix(in srgb, var(--accent) 80%, var(--panel2)); background: color-mix(in srgb, var(--accent) 8%, var(--panel2)); }
      .alert-icon { flex: none; display: flex; color: var(--accent); margin-top: 1px; }
      .alert.warn { border-left-color: var(--warn); background: color-mix(in srgb, var(--warn) 8%, var(--panel2)); }
      .alert.warn .alert-icon { color: var(--warn); }
      .alert.danger { border-left-color: var(--danger); background: color-mix(in srgb, var(--danger) 8%, var(--panel2)); }
      .alert.danger .alert-icon { color: var(--danger); }
      .alert.ok { border-left-color: var(--ok); background: color-mix(in srgb, var(--ok) 8%, var(--panel2)); }
      .alert.ok .alert-icon { color: var(--ok); }
      
      /* SubTabs (設定ページ内の縦サブタブ・active は左に accent バー) */
      .subtabs { display: flex; flex-direction: column; gap: 2px; }
      .subtab {
        position: relative; display: flex; align-items: center; gap: 8px; width: 100%;
        padding: 8px 12px; border: none; border-radius: var(--r-sm); background: none;
        color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 600; text-align: left;
        cursor: pointer; user-select: none; transition: background .12s ease, color .12s ease;
      }
      .subtab:hover { background: var(--panel2); color: var(--text); }
      .subtab.active { background: var(--panel2); color: var(--nav-active-text); }
      .subtab.active::before {
        content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
        width: 3px; height: 20px; border-radius: 0 3px 3px 0; background: var(--accent);
      }
      .subtab:focus-visible { outline: none; box-shadow: var(--ring); }
      
      /* DropdownButton (アイコン＋値＋キャレットの選択トリガ。native select の見た目寄せ版) */
      .dropdown-btn {
        display: inline-flex; align-items: center; gap: 8px; padding: 7px 11px;
        background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: var(--r-sm);
        font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
        transition: border-color .15s ease, background .15s ease;
      }
      .dropdown-btn:hover { border-color: var(--border-hover); }
      .dropdown-btn:focus-visible { outline: none; border-color: var(--accent); box-shadow: var(--ring); }
      .dropdown-btn-icon { flex: none; display: flex; color: var(--muted); }
      .dropdown-btn-label { flex: 1; text-align: left; white-space: nowrap; }
      .dropdown-btn-caret { flex: none; color: var(--muted); font-size: 14px; line-height: 1; transition: transform .15s ease; }
      .dropdown-btn[aria-expanded="true"] .dropdown-btn-caret { transform: rotate(180deg); }
      
      /* ---------- Utilities ---------- */
      .hidden { display: none !important; }
      .muted { color: var(--muted); }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      
      /* ---------- Form: 必須マーク / 折りたたみ / サブ見出し（通知オーバーホール）---------- */
      .req { color: var(--danger); margin-left: 2px; font-weight: 700; }
      .subhead { color: var(--text); font-weight: 700; font-size: 13px; margin: 18px 0 4px; letter-spacing: .02em; }
      details.section { border: 1px solid var(--border); border-radius: var(--r); background: var(--panel); margin: 14px 0; }
      details.section > summary {
        list-style: none; cursor: pointer; padding: 12px 14px; font-weight: 700; color: var(--text);
        display: flex; align-items: center; gap: 8px; user-select: none; border-radius: var(--r);
      }
      details.section > summary::-webkit-details-marker { display: none; }
      details.section > summary::before { content: "▶"; color: var(--muted); font-size: 11px; transition: transform .15s ease; }
      details.section[open] > summary::before { transform: rotate(90deg); }
      details.section > summary:hover { background: var(--panel2); }
      details.section > summary:focus-visible { outline: none; box-shadow: var(--ring); }
      details.section > .section-body { padding: 2px 14px 14px; }
      
      /* ---------- Containers: fieldset ---------- */
      fieldset { border: 1px solid var(--border); border-radius: var(--r); margin: 14px 0; padding: 14px 16px; background: var(--panel); }
      legend { color: var(--text); padding: 0 8px; font-weight: 600; }
      
      /* ---------- App shell: topbar / sidebar / main / cards ---------- */
      .shell { display: grid; grid-template-columns: 210px 1fr; min-height: calc(100vh - 57px); }
      .side { border-right: 1px solid var(--border); padding: 14px 10px; background: var(--panel); }
      .side .navitem {
        display: flex; align-items: center; gap: 9px; padding: 10px 12px; border-radius: var(--r-sm);
        color: var(--muted); cursor: pointer; margin-bottom: 3px; font-weight: 500; user-select: none;
        border: 1px solid transparent; transition: background .17s ease, color .17s ease;
      }
      .side .navitem:hover { background: var(--panel2); color: var(--text); }
      .side .navitem.active { background: var(--elevated); color: var(--nav-active-text); border-color: transparent; font-weight: 600; box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .04); }
      .side .navitem.active:hover { background: color-mix(in srgb, #fff 4%, var(--elevated)); }
      .topbar {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 11px 18px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 20;
        box-shadow: 0 1px 0 var(--border), 0 2px 8px rgba(0, 0, 0, .18);
      }
      .srv { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .ava {
        width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; flex: none;
        justify-content: center; font-weight: 700; background: var(--accent); color: #fff; overflow: hidden;
      }
      .ava img { width: 100%; height: 100%; object-fit: cover; display: block; }
      main { padding: 22px; max-width: 940px; }
      .card {
        background: var(--elevated); border: 1px solid transparent; border-radius: var(--r);
        padding: 15px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .17s ease, background .17s ease, transform .04s;
      }
      .card:hover { background: color-mix(in srgb, #fff 4%, var(--elevated)); }
      .card:active { transform: translateY(1px); }
      .listrow {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 14px 16px; border: 1px solid transparent; border-radius: var(--r); margin-bottom: 8px; background: var(--elevated);
        box-shadow: 0 1px 2px rgba(0, 0, 0, .3);
      }
      .listrow:hover { background: color-mix(in srgb, #fff 4%, var(--elevated)); }
      .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
      .search { position: relative; }
      .pickrow {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 6px; background: var(--panel2);
      }
      
      /* ---------- Server rail (Discord 風・最左のサーバー切替列) ---------- */
      .server-rail {
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        flex: none; width: 72px; padding: 12px 0; background: var(--bg); overflow-y: auto;
      }
      .server-rail-item {
        position: relative; flex: none; width: 48px; height: 48px; padding: 0; border: none; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        border-radius: 24px; background: var(--elevated); color: var(--text);
        font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; user-select: none;
        transition: border-radius .15s ease, background .15s ease, color .15s ease;
      }
      .server-rail-item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      /* 左端の白インジケータ（hover で伸び、active で最大） */
      .server-rail-item::before {
        content: ""; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
        width: 4px; height: 0; border-radius: 0 4px 4px 0; background: var(--nav-active-text); transition: height .15s ease;
      }
      .server-rail-item:hover { border-radius: 16px; background: var(--accent); color: #fff; }
      .server-rail-item:hover::before { height: 20px; }
      .server-rail-item.active { border-radius: 16px; background: var(--accent); color: #fff; }
      .server-rail-item.active::before { height: 40px; }
      .server-rail-item.add { color: var(--ok); }
      .server-rail-item.add:hover { background: var(--ok); color: #fff; }
      .server-rail-item:focus-visible { outline: none; box-shadow: var(--ring); }
      .server-rail-divider { flex: none; width: 32px; height: 2px; border-radius: 1px; background: var(--border2); margin: 2px 0; }
      
      /* ---------- App-specific: 単発候補スロット (one-off slots) ---------- */
      .slotgroup { border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 12px; margin-bottom: 10px; background: var(--panel2); }
      .slotgroup-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .slotgroup-head .slotDate { max-width: 220px; flex: 1 1 160px; }
      .timechips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
      .timechip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg); border: 1px solid var(--border2); border-radius: 999px; padding: 3px 6px 3px 10px; }
      .timechip input[type=time] { width: auto; border: none; background: none; padding: 2px 0; }
      .timechip input[type=time]:focus { box-shadow: none; }
      
      /* ---------- Modal / dialog ---------- */
      .backdrop {
        position: fixed; inset: 0; background: var(--backdrop); display: flex; align-items: center;
        justify-content: center; z-index: 80; padding: 20px; animation: fade .15s ease;
      }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
      .modal { background: var(--elevated); border: 1px solid var(--border2); border-radius: var(--r-lg); box-shadow: var(--shadow); max-width: 420px; width: 100%; padding: 20px; }
      .modal h3 { margin: 0 0 8px; }
      .modal p { margin: 0 0 16px; color: var(--text); }
      .modal .actions { justify-content: flex-end; }
      
      /* ネイティブ <dialog> を使う小さな確認（破棄ガード等）。div 版 .modal と衝突しないよう dialog セレクタで限定 */
      dialog.modal { margin: auto; }
      dialog.modal::backdrop { background: var(--backdrop); animation: fade .15s ease; }
      
      /* 大きいフォーム用モーダル（ネイティブ <dialog>）。背景は2トーンのみ:
         サーフェス=--panel2（面・詳細セクション）／ リセス=--panel（入力欄・番号ノード）。Discord 設定ダイアログ準拠の沈んだ2トーン。
         ヘッダ/フッタ固定・ボディのみスクロール。 */
      dialog.modal-lg {
        width: min(820px, calc(100vw - 32px)); max-height: min(90vh, 940px);
        padding: 0; margin: auto; overflow: hidden;
        background: var(--panel2); color: var(--text);
        border: 1px solid var(--border2); border-radius: var(--r-lg); box-shadow: var(--shadow);
      }
      dialog.modal-lg[open] { display: flex; flex-direction: column; }
      dialog.modal-lg::backdrop { background: var(--backdrop); animation: fade .15s ease; }
      .modal-head { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 17px 24px; border-bottom: 1px solid var(--border); background: var(--panel2); }
      .modal-head h3 { margin: 0; font-size: 16px; font-weight: 700; }
      .modal-close { flex: none; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: none; background: none; color: var(--muted); border-radius: var(--r-sm); cursor: pointer; font-size: 16px; transition: background .15s ease, color .15s ease; }
      .modal-close:hover { background: rgba(255, 255, 255, .06); color: var(--text); }
      .modal-close:focus-visible { outline: none; box-shadow: var(--ring); }
      .modal-body { flex: 1 1 auto; overflow-y: auto; padding: 10px 24px 18px; }
      .modal-foot { flex: none; display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 14px 24px; border-top: 1px solid var(--border); background: var(--panel2); }
      
      /* ダークモード用スクロールバー（フォームモーダル本体）。サーフェス色のボーダーで inset 表現 */
      .modal-body { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
      .modal-body::-webkit-scrollbar { width: 12px; }
      .modal-body::-webkit-scrollbar-track { background: transparent; }
      .modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 999px; border: 3px solid var(--panel2); background-clip: padding-box; }
      .modal-body::-webkit-scrollbar-thumb:hover { background: var(--border-hover); border: 3px solid var(--panel2); background-clip: padding-box; }
      
      /* 2トーン徹底（ダイアログ内のみ上書き）: プレビュー=リセス、詳細セクションは面に溶かしフラット化 */
      dialog.modal-lg .summary { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
      dialog.modal-lg details.section { background: transparent; border: 1px solid var(--border); }
      dialog.modal-lg details.section > summary:hover { background: rgba(255, 255, 255, .03); }

      /* ---------- 子ページ（メインエリア差し替え・ADR 0016 決定#1） ----------
         フォーム系は <dialog>.show()（非モーダル＝背景暗転なし・top-layer でない）で開き、
         main 内のリスト(section)を隠してメインエリアを占有する＝「ページ遷移」。
         サイドナビ／ヘッダは main の外なので常駐する。 */
      main.has-page > section { display: none; }
      dialog.modal-lg.as-page[open] {
        position: static; inset: auto; display: flex; flex-direction: column;
        width: 100%; max-width: none; height: auto; max-height: none;
        margin: 0; border: none; border-radius: 0; box-shadow: none;
        background: transparent; min-height: calc(100vh - 130px);
      }
      dialog.modal-lg.as-page .modal-head {
        background: transparent; padding: 0 0 14px;
        border-bottom: 1px solid var(--border);
      }
      dialog.modal-lg.as-page .modal-body { padding: 16px 0; }
      dialog.modal-lg.as-page .modal-foot {
        background: transparent; padding: 14px 0 0; border-top: 1px solid var(--border);
      }
      /* ページ見出し: パンくず＋戻る（ADR 0016 決定#7） */
      .page-crumb { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); margin-bottom: 4px; }
      .page-crumb a { color: var(--muted); text-decoration: none; }
      .page-crumb a:hover { color: var(--text); text-decoration: underline; }
      .page-back {
        flex: none; display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
        background: var(--panel); border: 1px solid var(--border2); border-radius: var(--r-sm);
        color: var(--text); cursor: pointer; font-size: 13px; font-family: inherit;
      }
      .page-back:hover { background: var(--btn-secondary-hover); border-color: var(--border-hover); }
      
      /* セクション見出し＋アクション（例: 通知見出し横の「＋新規通知」） */
      .sec-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
      .sec-head h2 { margin: 0; }
      
      /* 配信タイムライン（通知フォーム ②案B）: 縦コネクタ線＋アクセント縁取りの番号ノード */
      .tl { position: relative; margin: 8px 0 2px; }
      .tl::before { content: ""; position: absolute; left: 13px; top: 24px; bottom: 24px; width: 2px; background: var(--border); border-radius: 2px; }
      .tl-step { position: relative; display: flex; gap: 13px; padding: 11px 0; }
      .tl-badge {
        position: relative; z-index: 1; flex: none; width: 26px; height: 26px; border-radius: 50%;
        background: var(--panel); border: 1.5px solid var(--accent); color: var(--accent);
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
        box-shadow: 0 0 0 4px var(--panel2);
      }
      .tl-main { flex: 1 1 auto; min-width: 0; padding-top: 2px; }
      .tl-title { color: var(--text); font-weight: 600; font-size: 13.5px; }
      .tl-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
      .tl-row .pre, .tl-row .post { color: var(--muted); font-size: 13px; }
      .tl-row input[type=number] { width: 76px; }
      .tl-send { font-size: 13px; margin: 10px 0 2px; }
      .tl-warn { color: var(--warn); font-size: 12.5px; margin-top: 6px; }
      
      /* ---------- Responsive ---------- */
      @media (max-width: 720px) {
        .shell { grid-template-columns: 1fr; min-height: 0; }
        .side { border-right: none; border-bottom: 1px solid var(--border); display: flex; gap: 6px; overflow-x: auto; padding: 10px; }
        .side .navitem { margin: 0; white-space: nowrap; }
        main { padding: 16px; }
      }
      @media (max-width: 640px) {
        .row, .row3 { grid-template-columns: 1fr; }
        .listrow { flex-direction: column; align-items: stretch; }
        .listrow .actions { justify-content: flex-start; }
        .toast { left: 16px; right: 16px; max-width: none; }
      }

      /* ===== design-system/styles/app-ui.css ===== */
      /* =============================================================
       * EventBot — App composition layer（管理UI ui/index.html 専用）
       * design-system の純コンポーネント（components.css）を、管理画面の
       * 「画面」へ組み立てるレイアウト糊。tokens / components とは別レイヤーで、
       * React 層・preview には不要なため index.css には含めない。
       * sync-ui.mjs が tokens.css + components.css と連結して
       * ui/index.html の <style> に注入する。
       * ============================================================= */
      
      /* ---- ワークスペース全体: 最左の server-rail ＋ 本体（topbar + shell） ---- */
      .ws-layout { display: flex; align-items: stretch; min-height: 100vh; }
      .ws-body { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--panel2); }
      
      /* server-rail は左に固定（本体をスクロールしても残す） */
      .ws-layout > .server-rail {
        position: sticky; top: 0; align-self: flex-start; height: 100vh;
        border-right: 1px solid var(--border);
      }
      
      /* ---- 狭幅: rail を上部の横スクロール帯へ ---- */
      @media (max-width: 720px) {
        .ws-layout { flex-direction: column; }
        .ws-layout > .server-rail {
          position: static; height: auto; width: 100%;
          flex-direction: row; overflow-x: auto; overflow-y: visible;
          padding: 8px 10px; border-right: none; border-bottom: 1px solid var(--border);
        }
        .ws-layout > .server-rail .server-rail-item::before { display: none; }
        .ws-layout > .server-rail .server-rail-divider { width: 2px; height: 32px; margin: 0 2px; }
      }

      /* ===== グループ分け（ADR 0015）===== */
      .grouping-toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
      .grouping-toolbar .spacer { flex:1; }
      .grouping-board { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:12px; }
      .grouping-col {
        background: var(--panel2); border:1px solid var(--border); border-radius: var(--r);
        padding:10px; min-height:180px; display:flex; flex-direction:column;
      }
      .grouping-col.pool { background: var(--panel); border-style:dashed; }
      .grouping-col-head { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
      .grouping-col-head .name { font-weight:600; flex:1; padding:2px 4px; border-radius: var(--r-sm); cursor: text; }
      .grouping-col-head .name:hover { background: var(--elevated); }
      .grouping-col-head .name[contenteditable="true"]:focus { outline: var(--ring); background: var(--bg); }
      .grouping-col-head .count { color: var(--muted); font-size:12px; }
      .grouping-cards { flex:1; display:flex; flex-direction:column; gap:6px; min-height:80px; }
      .grouping-card {
        background: var(--elevated); border:1px solid var(--border); border-radius: var(--r-sm);
        padding:6px 8px; cursor:grab; user-select:none; display:flex; gap:6px; align-items:center;
        font-size:13px;
      }
      .grouping-card:active { cursor: grabbing; }
      .grouping-card.violated-required { border-color: var(--danger); box-shadow: 0 0 0 1px var(--danger); }
      .grouping-card.violated-preferred { border-color: var(--warn); box-shadow: 0 0 0 1px var(--warn); }
      .grouping-card.no-longer { opacity:.55; text-decoration: line-through; }
      .grouping-card .badge { font-size:10px; padding:1px 5px; border-radius:8px; }
      .grouping-card .badge.new { background: var(--accent-soft); color: var(--accent); }
      .grouping-card .badge.gone { background: rgba(242,63,67,.15); color: var(--danger); }
      .sortable-ghost { opacity: 0.4; }
      .sortable-chosen { outline: var(--ring); }
      .grouping-alerts {
        margin-top:12px; padding:10px; border-radius: var(--r); background: var(--panel2);
        border-left: 3px solid var(--warn); max-height: 180px; overflow:auto;
      }
      .grouping-alerts.has-error { border-left-color: var(--danger); }
      .grouping-alerts h4 { margin:0 0 6px; font-size:13px; }
      .grouping-alerts ul { margin:0; padding-left: 18px; font-size:12px; }
      .grouping-alerts .err { color: var(--danger); }
      .grouping-alerts .warn { color: var(--warn); }
      .grouping-constraints-panel {
        margin-top:14px; padding:10px; border-radius: var(--r); background: var(--panel2);
      }
      .grouping-constraints-panel h4 { margin:0 0 8px; font-size:13px; }
      .grouping-constraints-list { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
      .grouping-constraint-row {
        display:flex; gap:6px; align-items:center; font-size:12px;
        background: var(--panel); padding:6px 8px; border-radius: var(--r-sm);
      }
      .grouping-constraint-row .spacer { flex:1; }
      .grouping-constraints-form { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
      .grouping-constraints-form select { min-width:120px; max-width:180px; padding:4px 6px; font-size:12px; }
    </style>
  <script src="/eventbot-tables.js"></script>

  <body>
    <!-- トークンゲート -->
    <div id="gate" class="hidden" style="max-width: 420px; margin: 80px auto;">
      <div class="card" style="cursor:default">
        <h1>管理トークン</h1>

    <!-- サーバー選択（最上位スコープ） -->
    <div id="picker" class="hidden">
      <div class="topbar">

      </div>
      <main style="max-width:760px; margin:0 auto;">
        <h2>管理するサーバーを選択</h2>
        <p class="muted">Bot が参加しているサーバーから選びます（Discord から自動取得）。</p>
        <div id="guildCards" class="grid-cards"></div>
      </main>
    </div>

    <!-- ワークスペース -->
    <div id="workspace" class="hidden">
      <div class="ws-layout">
      <nav class="server-rail" id="serverRail" aria-label="サーバー一覧"></nav>
      <div class="ws-body">
      <div class="topbar">
        <div class="srv">
          <div class="ava" id="wsAva">?</div>
          <div><div id="wsName" style="font-weight:600">—</div><div class="muted" style="font-size:11px">サーバー</div></div>
        </div>
        <div class="actions">
          <button class="btn secondary" id="logout">ログアウト</button>

      <div class="shell">
        <nav class="side">

          <div class="navitem" data-sec="segments">👥 メンバー区分</div>
          <div class="navitem" data-sec="records">🗒 回答履歴</div>
          <div class="navitem" data-sec="sendlog">📤 送信履歴</div>

        <main>
          <section id="sec-notifications"></section>
          <section id="sec-segments" class="hidden"></section>
          <section id="sec-records" class="hidden"></section>
          <section id="sec-sendlog" class="hidden"></section>
          <section id="sec-setup" class="hidden"></section>

          <!-- 子ページ（メインエリア差し替え・ADR 0016 決定#1）。main 直下に置き、
               開いた dialog を show() で表示し main.has-page でリストを隠す。 -->
          <dialog class="modal-lg as-page" id="occDialog" aria-labelledby="occTitle">
            <div class="modal-head">

                <div class="page-crumb"><a href="#" data-occ-close>通知</a> <span>›</span> <span id="occCrumb">開催回</span></div>

          </dialog>
          <dialog class="modal-lg as-page" id="groupingDialog" aria-labelledby="groupingTitle">
            <div class="modal-head">
              <div>
                <div class="page-crumb"><a href="#" id="groupingCrumbBack">開催回</a> <span>›</span> <span>グループ分け</span></div>
                <h3 id="groupingTitle">グループ分け</h3>
              </div>
              <button type="button" class="page-back" id="groupingClose" aria-label="戻る">← 戻る</button>
            </div>

            <div class="modal-foot">
              <span id="groupingErr" class="muted" style="color:var(--danger);margin-right:auto"></span>
              <button type="button" class="btn ghost" id="groupingCancel">閉じる</button>
              <button type="button" class="btn secondary" id="groupingAnnounce">📣 結果をチャンネルへ投稿</button>
              <button type="button" class="btn" id="groupingSave">保存</button>
            </div>
          </dialog>
          <dialog class="modal-lg as-page" id="segMembersDialog" aria-labelledby="segMembersTitle">
            <div class="modal-head">
              <div>
                <div class="page-crumb"><a href="#" data-segm-close>メンバー区分</a> <span>›</span> <span>メンバー</span></div>
                <h3 id="segMembersTitle">区分メンバー</h3>
              </div>
              <button type="button" class="page-back" data-segm-close aria-label="戻る">← 戻る</button>
            </div>
            <div class="modal-body" id="segMembersBox"></div>
            <div class="modal-foot"><button type="button" class="btn ghost" data-segm-close>閉じる</button></div>
          </dialog>

          <div id="nFormHost"></div>

    <div id="toast" class="toast"></div>

    <script>
      const TOKEN_KEY = 'eventbot_admin_token';
      const GUILD_KEY = 'eventbot_guild';
      let token = localStorage.getItem(TOKEN_KEY) || '';
      let guild = null; // { id, name, icon }

      const $ = (s) => document.querySelector(s);
      function esc(v) {
        return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
      let toastTimer = null;
      function toast(msg, err) {
        const t = $('#toast');
        t.textContent = msg;
        t.className = 'toast show' + (err ? ' err' : '');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => (t.className = 'toast'), 2800);
      }
      async function api(path, opts = {}) {
        const res = await fetch('/api/admin' + path, {
          ...opts,
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, ...(opts.headers || {}) },
        });
        if (res.status === 401) { showGate(); throw new Error('認証に失敗しました'); }
        if (!res.ok) {
          let detail = res.status;
          try { const b = await res.json(); if (b && b.error) detail = res.status + ' ' + b.error; } catch (_) {}
          throw new Error('エラー: ' + detail);
        }
        return res.status === 204 ? null : res.json();
      }

      // ----- 共通UI: 確認モーダル / ボタンのbusy状態 -----
      function confirmDialog(message, opts = {}) {
        return new Promise((resolve) => {
          // ネイティブ <dialog>。top-layer なので、開催回/メンバー等のフォームモーダル上でも背後に隠れない。
          const d = document.createElement('dialog');
          d.className = 'modal';
          d.setAttribute('aria-label', '確認');
          d.innerHTML = `<h3>${esc(opts.title || '確認')}</h3>
            <p>${esc(message)}</p>
            <div class="actions">
              <button class="btn ghost" data-cancel>キャンセル</button>
              <button class="btn ${opts.danger ? 'danger' : ''}" data-ok>${esc(opts.okLabel || 'OK')}</button>
            </div>`;
          document.body.appendChild(d);
          const close = (val) => { d.close(); d.remove(); resolve(val); };
          d.querySelector('[data-cancel]').onclick = () => close(false);
          d.querySelector('[data-ok]').onclick = () => close(true);
          d.addEventListener('cancel', (e) => { e.preventDefault(); close(false); }); // Esc=キャンセル
          d.addEventListener('click', (e) => { if (e.target === d) close(false); }); // 背景クリック=キャンセル
          d.showModal();
          d.querySelector('[data-ok]').focus();
        });
      }
      async function withBusy(btn, fn) {
        if (!btn) return fn();
        const wasDisabled = btn.disabled;
        btn.classList.add('busy'); btn.disabled = true;
        try { return await fn(); }
        finally { btn.classList.remove('busy'); btn.disabled = wasDisabled; }
      }

      // ================= 画面遷移 =================
      function showGate() {
        $('#gate').classList.remove('hidden');
        $('#picker').classList.add('hidden');
        $('#workspace').classList.add('hidden');
      }
      async function showPicker() {
        $('#gate').classList.add('hidden');
        $('#workspace').classList.add('hidden');
        $('#picker').classList.remove('hidden');
        await loadGuilds();
      }
      function showWorkspace() {
        cacheGuildMembers = null; // サーバー跨ぎでピッカーに前サーバーの在籍が残らないようリセット
        $('#gate').classList.add('hidden');
        $('#picker').classList.add('hidden');
        $('#workspace').classList.remove('hidden');
        $('#wsName').textContent = guild.name;
        $('#wsAva').textContent = (guild.name || '?').slice(0, 1);
        renderServerRail(); // 最左サーバー列を描画（非同期・ベストエフォート）
        switchSection('notifications');
      }

      // ================= サーバー選択 =================
      let cacheGuilds = null;
      async function fetchGuilds() {
        if (cacheGuilds) return cacheGuilds;
        cacheGuilds = await api('/guilds');
        return cacheGuilds;
      }
      async function loadGuilds() {
        let guilds = [];
        try { guilds = await fetchGuilds(); } catch (e) { toast(e.message, true); }
        $('#guildCards').innerHTML = guilds.length
          ? guilds.map((g) => {
              const u = guildIconUrl(g);
              const ava = u ? `<img src="${esc(u)}" alt="" loading="lazy" onerror="this.remove()">` : esc((g.name || '?').slice(0, 1));
              return `<div class="card" data-gid="${esc(g.id)}" data-gname="${esc(g.name)}">
              <div class="srv"><div class="ava">${ava}</div>
              <div><div style="font-weight:600">${esc(g.name)}</div>
              <div class="muted" style="font-size:12px">ID: ${esc(g.id)}</div></div></div></div>`;
            }).join('')
          : '<p class="muted">参加サーバーが取得できませんでした。bot トークン / 権限を確認してください。</p>';
        document.querySelectorAll('#guildCards .card').forEach((c) => {
          c.onclick = () => selectGuild({ id: c.dataset.gid, name: c.dataset.gname });
        });
      }
      // サーバーアイコンの CDN URL（icon ハッシュがあれば。無ければ null → 頭文字フォールバック）
      function guildIconUrl(g) {
        return g && g.icon ? 'https://cdn.discordapp.com/icons/' + g.id + '/' + g.icon + '.png?size=96' : null;
      }

        if (mode === 'biweekly') return `FREQ=WEEKLY;INTERVAL=2;BYDAY=${byday}`;
        if (mode === 'monthly') {
          const rules = getMonthlyRules();

        }
        return '';

      function parseRRuleToBuilder(rrule) {
        const out = { mode: 'weekly', byday: 'SA', nth: '2', rules: [] };
        if (!rrule) return out;
        const p = Object.fromEntries(rrule.split(';').map((x) => { const [k, v] = x.split('='); return [k.toUpperCase(), v]; }));
        const freq = (p.FREQ || '').toUpperCase(), byday = (p.BYDAY || '').toUpperCase();
        if (freq === 'MONTHLY') {
          out.mode = 'monthly';
          out.rules = byday.split(',').map((tok) => {
            const m = tok.match(/^(-?\d+)([A-Z]{2})$/);
            return m ? { nth: m[1], byday: m[2] } : null;
          }).filter(Boolean);
          if (out.rules.length) { out.nth = out.rules[0].nth; out.byday = out.rules[0].byday; }

        const oneoffSched = (n) => {
          const earliest = `${esc(n.one_off_date || '')}${n.start_time ? ' ' + esc(fmtTimeRange(n.start_time, n.duration_minutes)) : ''}`;
          if (n.decided_occurrence_id && n.decided_date) {
            return `単発・確定 ${esc(n.decided_date)}${n.decided_time ? ' ' + esc(fmtTimeRange(n.decided_time, n.duration_minutes)) : ''}`;
          }
          if ((n.candidate_count || 0) > 1) return `単発・調整中（候補${n.candidate_count}件・最早 ${earliest}）`;
          return `単発 ${earliest}`;
        };
        const rows = notifs.map((n) => {
          const sched = n.type === 'oneoff'
            ? oneoffSched(n)
            : esc(humanRRule(n.rrule, n.start_time, n.duration_minutes));
          return `<div class="listrow">
            <div><div style="font-weight:600">${esc(n.name)}</div>
              <div class="muted" style="font-size:12px;margin-top:2px">
                <span class="pill">${esc(segName(n.segment_id))}</span>
                ${sched} ・ ${esc(chName(n.channel_id))}</div></div>
            <div class="actions">
              <span class="pill ${n.active ? 'on' : 'off'}">${n.active ? '有効' : '無効'}</span>
              <button class="btn sm ghost" data-nrecruit="${esc(n.uuid)}">📣 募集</button>
              <button class="btn sm ghost" data-nedit="${esc(n.uuid)}">編集</button>
              <button class="btn sm ghost" data-nocc="${esc(n.uuid)}">開催回</button>
              <button class="btn sm ghost danger" data-ndel="${esc(n.uuid)}">削除</button>
            </div></div>`;
        }).join('');

        $('#sec-notifications').innerHTML = `${est ? estimateBanner(est) : ''}
          <div class="sec-head"><h2>通知 (${notifs.length})</h2>
            <button class="btn" id="nNewBtn"${segs.length ? '' : ' disabled'}>＋ 新規通知</button></div>
          ${segs.length ? '' : '<p class="muted">※ 先に「メンバー区分」を作成してください（通知の対象になります）。</p>'}
          ${notifs.length ? rows : '<div class="empty">まだ通知がありません。<br>「＋ 新規通知」から最初の通知を作成しましょう。</div>'}`;

        // 通知フォーム（子ページ）は main 直下の #nFormHost に注入する（開催回/グループ分けの
        // <dialog> は静的 HTML に常駐）。
        $('#nFormHost').innerHTML = segs.length ? notifForm() : '';
        if (segs.length) {
          bindNotifForm();
          $('#nNewBtn').onclick = () => navigate('notifications/new');
        }
        document.querySelectorAll('[data-nedit]').forEach((b) => {
          b.onclick = () => navigate('notifications/' + b.dataset.nedit + '/edit');
        });
        document.querySelectorAll('[data-nocc]').forEach((b) => {
          b.onclick = () => navigate('notifications/' + b.dataset.nocc + '/occurrences');
        });
        document.querySelectorAll('#occDialog [data-occ-close]').forEach((b) => { b.onclick = (e) => { e.preventDefault(); closeOccurrencesPage(); }; });
        document.querySelectorAll('[data-nrecruit]').forEach((b) => {
          b.onclick = async () => {
            if (!(await confirmDialog('この通知の募集メッセージをチャンネルへ投稿します。', { okLabel: '送信する' }))) return;
            await withBusy(b, async () => {
              try { const r = await api('/notifications/' + b.dataset.nrecruit + '/recruit', { method: 'POST' });
                toast(r && r.message ? r.message : '募集を送信しました'); }
              catch (e) { toast(e.message, true); }
            });
          };
        });
        document.querySelectorAll('[data-ndel]').forEach((b) => {
          b.onclick = async () => {
            if (!(await confirmDialog('この通知を、配下の開催回・回答ごとすべて削除します。元に戻せません。', { danger: true, okLabel: '削除' }))) return;
            try { await api('/notifications/' + b.dataset.ndel, { method: 'DELETE' }); toast('削除しました'); loadNotifications(); }
            catch (e) { toast(e.message, true); }
          };
        });
      }

      function humanRRule(rrule, time, dur) {
        const b = parseRRuleToBuilder(rrule);
        const wd = wdLabel(b.byday), tr = fmtTimeRange(time || '', dur);
        if (b.mode === 'weekly') return `毎週 ${wd}曜日 ${tr}`;
        if (b.mode === 'biweekly') return `隔週 ${wd}曜日 ${tr}`;
        return `${humanMonthly(b.rules)} ${tr}`;
      }

      function notifForm() {

        const chOpts = cacheChannels.length

        return `<dialog class="modal-lg as-page" id="nDialog" aria-labelledby="nFormTitle">

            </div>

                <input id="nDuration" type="number" min="0" placeholder="例: 120（2時間）" /></div>

              <div class="tl-step" id="nRemindStartBox">

                  <div class="tl-title">未回答者へリマインド</div>

                  <div class="tl-row"><span class="pre">開始の</span><input id="nDeadlineHours" type="number" min="0" placeholder="—" /><span class="post">時間前　※空欄＝締切なし</span></div>
                  <div class="muted" style="font-size:12px;margin-top:2px">締切後の変更通知先は「詳細設定」で変更できます。</div>

            <div class="tl-send muted" id="nSendLine">🕘 通知配信時刻

                </select>
                <p id="nMentionWarn" class="muted hidden" style="font-size:12px;color:var(--warn);margin-top:6px">⚠️ @everyone 区分でバイネームは全員への個別メンションになり、人数が多いと「ほかN名」で省略されます。</p>

                <div class="subhead">締切後の変更通知</div>
                <div id="nAlertRow"><label>変更通知チャンネル <span class="muted">（締切後の変更を投稿・空欄＝投稿チャンネル）</span></label>
                  <select id="nAlertChannel"><option value="">（投稿チャンネルと同じ）</option>${chOpts}</select>
                  <p class="muted" style="font-size:12px;margin-top:6px">締切後に回答が変更されると、上のチャンネルへメンションなしで記録投稿し、回答履歴に「締切後変更」として残ります。</p></div>

                <div class="subhead">機能</div>
                <div class="setting-row" id="nQuotaRow">
                  <div class="setting-row-main"><div class="setting-row-title">ノルマ（参加間隔の督促）</div><div class="setting-row-desc">前回参加から指定日数を超えたメンバーへ DM で参加を促します。</div></div>
                  <div class="setting-row-control"><label class="switch"><input type="checkbox" id="nQuota" aria-label="ノルマ（参加間隔の督促）" /><span class="switch-slider"></span></label></div>
                </div>
                <div id="nQuotaBox" class="hidden" style="max-width:280px"><label>ノルマ間隔（日数）</label><input id="nQuotaInterval" type="number" placeholder="例: 30" /></div>
                <div class="setting-row" id="nAssignmentRow">
                  <div class="setting-row-main"><div class="setting-row-title">番号割り当て</div><div class="setting-row-desc">参加者に連番 1..N をランダムに割り当てます（個室・座席等）。</div></div>
                  <div class="setting-row-control"><label class="switch"><input type="checkbox" id="nAssignment" aria-label="番号割り当て" /><span class="switch-slider"></span></label></div>
                </div>
                <div class="setting-row" id="nGroupingRow">
                  <div class="setting-row-main"><div class="setting-row-title">グループ分け</div><div class="setting-row-desc">参加者を複数のグループに分割します（管理画面でドラッグ＆ドロップ・ペア制約対応）。</div></div>
                  <div class="setting-row-control"><label class="switch"><input type="checkbox" id="nGrouping" aria-label="グループ分け" /><span class="switch-slider"></span></label></div>

                </div>

          <div class="modal-foot">

            <button type="button" class="btn" id="nSave">保存</button>
          </div>
        </dialog>`;
      }

      function refreshNextOptions(keep) {
        const dates = nextWeekdayDates($('#nWeekday').value, 4);
        const opts = dates.slice();
        if (keep && !opts.includes(keep)) opts.unshift(keep);
        $('#nNext').innerHTML = opts.map((d) => `<option value="${d}">${d}（${wdLabel($('#nWeekday').value)}）</option>`).join('');
        if (keep) $('#nNext').value = keep;
      }
      function syncNotifUI() {
        const mode = $('#nMode').value;
        const monthly = mode === 'monthly';
        $('#nMonthlyBox').classList.toggle('hidden', !monthly);
        $('#nWeekdayBox').classList.toggle('hidden', monthly);
        $('#nNextBox').classList.toggle('hidden', mode !== 'biweekly');
        // 回答不要(通知のみ)は回答依存の機能（リマインド/ノルマ/番号/締切）を隠す（ADR 0010/0014）。
        const announceOnly = !$('#nRequireResponse').checked;
        if (announceOnly) { $('#nQuota').checked = false; $('#nAssignment').checked = false; $('#nGrouping').checked = false; }
        $('#nQuotaRow').classList.toggle('hidden', announceOnly);
        $('#nQuotaBox').classList.toggle('hidden', announceOnly || !$('#nQuota').checked);
        $('#nAssignmentRow').classList.toggle('hidden', announceOnly);
        $('#nGroupingRow').classList.toggle('hidden', announceOnly);
        $('#nRemindStartBox').classList.toggle('hidden', announceOnly);
        $('#nRemindUndecidedBox').classList.toggle('hidden', announceOnly);
        $('#nDeadlineBox').classList.toggle('hidden', announceOnly);
        $('#nAlertRow').classList.toggle('hidden', announceOnly);
        $('#nRecruitLabel').textContent = announceOnly ? '告知を投稿' : '募集を投稿';
        // バイネーム × @everyone 区分は全員個別メンションになるため警告を出す。
        const seg = cacheSegments.find((s) => String(s.id) === $('#nSegment').value);
        const warn = $('#nMention').value === 'members' && !!seg && seg.mention_role_id === '@everyone';
        $('#nMentionWarn').classList.toggle('hidden', !warn);
        // 配信タイムラインの整合性警告（プレビュー文は廃止し、警告のみ表示）
        $('#nWarn').innerHTML = notifPreview().warns.map((w) => `<div class="tl-warn">⚠️ ${esc(w)}</div>`).join('');
      }
      // 配信タイムラインの自然文プレビューと整合性警告を組み立てる。
      // 空欄は NaN として「—」表示し、NaN は比較が常に false なので誤警告も出ない。
      function notifPreview() {
        const respond = $('#nRequireResponse').checked;
        const num = (id) => { const v = $('#' + id).value.trim(); return v === '' ? NaN : Number(v); };
        const show = (n) => (isFinite(n) ? n : '—');
        const recruit = num('nRecruit'), rs = num('nRemindStart'), ru = num('nRemindUndecided');
        const dh = $('#nDeadlineHours').value.trim();
        const sh = String($('#nSendHour').value).padStart(2, '0');
        const sched = scheduleSummary();
        const send = `毎日 ${sh}:00 に配信`;
        const warns = [];
        if (!respond) {
          return { text: `${show(recruit)}日前に告知 → 🎉 開催（${sched}）／${send}`, warns };
        }
        const parts = [`${show(recruit)}日前に募集`, `${show(rs)}日前から毎日 未回答へ催促`, `${show(ru)}日前に未定へ`];
        if (dh !== '') parts.push(`開始${Number(dh)}時間前に締切`);
        parts.push(`🎉 開催（${sched}）`);
        if (isFinite(rs) && isFinite(recruit) && rs > recruit) warns.push('未回答リマインド開始が募集より前です（募集前に催促が飛びます）。');
        if (isFinite(ru) && isFinite(rs) && ru > rs) warns.push('未定リマインドが未回答リマインド開始より前です。');
        if (dh !== '' && isFinite(recruit) && Number(dh) > recruit * 24) warns.push('締切が募集より前になっています。');
        return { text: parts.join(' → ') + `／${send}`, warns };
      }
      // 空欄は既定値、0 は 0 のまま（|| は 0 を既定で潰すため使わない）。
      function numOrDefault(id, dflt) { const v = $('#' + id).value.trim(); return v === '' ? dflt : Number(v); }
      let formDirty = false;
      function markDirty() { formDirty = true; }
      function bindNotifForm() {
        refreshNextOptions();
        renderMonthlyRules([]);
        ['nMode', 'nStartTime', 'nNext', 'nDuration', 'nRequireResponse', 'nMention', 'nSegment', 'nSendHour'].forEach((id) => { $('#' + id).onchange = syncNotifUI; });
        ['nRecruit', 'nRemindStart', 'nRemindUndecided', 'nDeadlineHours'].forEach((id) => { $('#' + id).oninput = syncNotifUI; });
        $('#nWeekday').onchange = () => { refreshNextOptions(); syncNotifUI(); };
        $('#nQuota').onchange = syncNotifUI;
        $('#nMonthlyAdd').onclick = addMonthlyRule;
        $('#nSave').onclick = (e) => withBusy(e.currentTarget, saveNotif);
        // 子ページ開閉・破棄ガード（dirty 時のみ確認）。
        const dlg = $('#nDialog');
        $('#nClose').onclick = attemptCloseNotif;
        $('#nCancel').onclick = attemptCloseNotif;
        const crumb = $('#nCrumbBack'); if (crumb) crumb.onclick = (e) => { e.preventDefault(); attemptCloseNotif(); };
        dlg.addEventListener('input', markDirty);
        dlg.addEventListener('change', markDirty);
        syncNotifUI();
      }
      // 新規=空で開く／編集=流し込んで開く。値はプログラム設定なので input/change は発火せず dirty は立たない。
      function openNotifModal(n) {
        const dlg = $('#nDialog'); if (!dlg) return;
        if (n && n.type === 'oneoff') { toast('単発通知の編集は現在無効です。', true); return; }
        resetNotifForm();
        if (n) fillNotifForm(n);
        $('#nFormErr').textContent = '';
        formDirty = false;
        openAsPage(dlg);
        const first = $('#nName'); if (first) first.focus();
      }
      async function attemptCloseNotif() {
        if (formDirty && !(await confirmDiscardNotif())) return;
        formDirty = false;
        closeAsPage($('#nDialog'));
        navigate(''); // 親（一覧）へ
      }
      // フォームモーダルは top-layer のため、確認も <dialog>（div の confirmDialog は下に隠れる）。
      function confirmDiscardNotif() {
        return new Promise((resolve) => {
          const d = document.createElement('dialog');
          d.className = 'modal';
          d.innerHTML = `<h3>編集中の内容を破棄しますか？</h3>
            <p>保存していない変更は失われます。</p>
            <div class="actions">
              <button class="btn ghost" data-cancel>編集に戻る</button>
              <button class="btn danger" data-ok>破棄して閉じる</button>
            </div>`;
          document.body.appendChild(d);
          const done = (v) => { d.close(); d.remove(); resolve(v); };
          d.querySelector('[data-cancel]').onclick = () => done(false);
          d.querySelector('[data-ok]').onclick = () => done(true);
          d.addEventListener('cancel', (e) => { e.preventDefault(); done(false); });
          d.addEventListener('click', (e) => { if (e.target === d) done(false); }); // 背景クリック=編集に戻る（既存 confirmDialog 規約に合わせる）
          d.showModal();
          d.querySelector('[data-ok]').focus();
        });
      }
      function resetNotifForm() {
        $('#nId').value = ''; $('#nFormTitle').textContent = '新規通知';
        { const c = $('#nCrumbLeaf'); if (c) c.textContent = '新規'; }
        $('#nName').value = ''; $('#nTitle').value = ''; $('#nBody').value = '';
        $('#nMode').value = 'weekly';
        $('#nWeekday').value = 'SA'; renderMonthlyRules([]);
        $('#nStartTime').value = '21:00'; $('#nDuration').value = ''; $('#nRecruit').value = '7';
        $('#nRemindStart').value = '3'; $('#nRemindUndecided').value = '1';
        $('#nQuotaInterval').value = '';
        $('#nQuota').checked = false; $('#nAssignment').checked = false;
        $('#nMention').value = 'role'; $('#nRequireResponse').checked = true; $('#nActive').checked = true;

      function fillNotifForm(n) {

      async function saveNotif() {
        const qi = $('#nQuotaInterval').value.trim();
        const dh = $('#nDeadlineHours').value.trim();
        const body = {
          guild_id: guild.id,
          name: $('#nName').value.trim(),
          channel_id: $('#nChannel').value.trim(),
          segment_uuid: $('#nSegment').value,
          type: 'recurring',
          rrule: buildRRule(),
          anchor_date: $('#nMode').value === 'biweekly' ? ($('#nNext').value || null) : null,
          start_time: $('#nStartTime').value.trim() || '21:00',
          duration_minutes: durValue(),
          message_title: $('#nTitle').value.trim(),
          message_body: $('#nBody').value.trim() || null,
          recruit_days_before: numOrDefault('nRecruit', 7),
          remind_start_days: numOrDefault('nRemindStart', 3),
          remind_undecided_days: numOrDefault('nRemindUndecided', 1),
          quota_enabled: $('#nQuota').checked ? 1 : 0,
          quota_interval_days: qi === '' ? null : Number(qi),

          grouping_enabled: $('#nGrouping').checked ? 1 : 0,
          mention_mode: $('#nMention').value,
          requires_response: $('#nRequireResponse').checked ? 1 : 0,
          // ③ 送信時刻・① 回答締切/変更通知チャンネル
          send_hour: Number($('#nSendHour').value),
          response_deadline_hours: dh === '' ? null : Number(dh),
          change_alert_channel_id: $('#nAlertChannel').value.trim() || null,
          active: $('#nActive').checked ? 1 : 0,
        };
        // モーダル(top-layer)表示中は toast が背面に隠れるため、検証/失敗はフッタにインライン表示。
        const err = (m) => { $('#nFormErr').textContent = m; };
        if (!body.name) return err('名前は必須です');
        if (!body.message_title) return err('見出しは必須です');
        if (!body.channel_id) return err('チャンネルを選択してください');
        if (!body.segment_uuid) return err('区分を選択してください');
        $('#nFormErr').textContent = '';
        const uuid = $('#nId').value;
        try {
          if (uuid) await api('/notifications/' + uuid, { method: 'PUT', body: JSON.stringify(body) });
          else await api('/notifications', { method: 'POST', body: JSON.stringify(body) });

          closeAsPage($('#nDialog'));
