      }

      // ----- 開催回・番号割り当て・候補日確定（通知の文脈） -----
      // cacheNotifs を最新化してから fn を呼ぶ（decide/undecide 後の decided_occurrence_id 反映用）
      async function refreshNotifsThen(fn) {
        try { cacheNotifs = await api('/notifications?guild_id=' + encodeURIComponent(guild.id)); } catch (_) {}
        fn();
      }
      async function loadOccTally(occUuid) {
        const el = $('#tally-' + cssId(occUuid));
        if (!el) return;
        try {
          const b = await api('/occurrences/' + occUuid + '/status');
          el.textContent = `参加 ${b.参加.length}・不参加 ${b.不参加.length}・未定 ${b.未定.length}・未回答 ${b.未回答.length}`;
        } catch (_) { el.textContent = ''; }
      }
      // CSS セレクタで使える ID 形式に変換（UUID のハイフンは CSS でそのまま使えるが、念のため）
      function cssId(uuid) { return String(uuid || '').replace(/[^A-Za-z0-9-]/g, ''); }
      const JADOW = ['日', '月', '火', '水', '木', '金', '土'];
      function jaDow(dateStr) {
        const [y, m, d] = (dateStr || '').split('/').map(Number);
        return (y && m && d) ? JADOW[new Date(y, m - 1, d).getDay()] : '';
      }
      /** 開催回の表示ラベル '2026/06/18 (木) 21:00〜23:00'（dur 未指定なら開始時刻のみ） */
      function occLabel(o, dur) {
        const w = jaDow(o.occurrence_date);
        return `${o.occurrence_date}${w ? ` (${w})` : ''}${o.start_time ? ' ' + fmtTimeRange(o.start_time, dur) : ''}`;
      }
      async function loadOccurrences(notifUuid) {
        const n = cacheNotifs.find((x) => x.uuid === notifUuid);
        const isOneoff = !!n && n.type === 'oneoff';
        // 確定回の UUID（旧 decided_occurrence_id は INTEGER のため、cacheNotifs の文脈で id→uuid 解決は別ロード時にやる）
        const decidedOccId = n ? n.decided_occurrence_id : null;
        let occs = [];
        try { occs = await api('/notifications/' + notifUuid + '/occurrences'); } catch (e) { return toast(e.message, true); }
        const rows = occs.map((o) => {
          const decided = decidedOccId === o.id;
          const label = o.status === 'cancelled' ? '取下げ' : (decided ? '確定' : (isOneoff ? '候補' : '予定'));
          const pillCls = o.status === 'cancelled' ? 'off' : 'on';
          const decideBtn = (isOneoff && decidedOccId == null && o.status === 'scheduled')
            ? `<button class="btn sm" data-decide="${esc(o.uuid)}" data-nuuid="${esc(notifUuid)}">この日時に確定</button>` : '';
          const undecideBtn = decided
            ? `<button class="btn sm ghost" data-undecide="${esc(notifUuid)}">確定解除</button>` : '';
          return `<div class="pickrow">
            <div>${esc(occLabel(o, n && n.duration_minutes))} <span class="pill ${pillCls}">${label}</span>
              <br><span class="muted" id="tally-${cssId(o.uuid)}" style="font-size:12px">集計中…</span></div>
            <div class="actions">${decideBtn}${undecideBtn}
              ${n && n.assignment_enabled ? `<button class="btn sm secondary" data-occ="${esc(o.uuid)}">番号割り当て</button>` : ''}
              ${n && n.grouping_enabled ? `<button class="btn sm secondary" data-grouping-occ="${esc(o.uuid)}" data-nuuid="${esc(notifUuid)}">グループ分け</button>` : ''}</div></div>`;
        }).join('');
        const recruitBtn = n
          ? `<div class="actions" style="margin-bottom:8px"><button class="btn sm secondary" id="occRecruit">📣 今すぐ募集を投稿</button></div>` : '';
        $('#occTitle').textContent = `開催回: ${n ? n.name : notifUuid} (${occs.length})`;
        const _occCrumb = $('#occCrumb'); if (_occCrumb) _occCrumb.textContent = n ? n.name : '開催回';
        $('#occBox').innerHTML = `${recruitBtn}
          ${occs.length ? rows : '<div class="empty">開催回はまだありません。<br>単発は保存時に候補が、繰り返しは募集タイミングで生成されます。</div>'}
          <div id="assignBox"></div>`;
        openAsPage($('#occDialog'));
        document.querySelectorAll('[data-occ]').forEach((b) => { b.onclick = () => loadAssignments(b.dataset.occ); });
        document.querySelectorAll('[data-grouping-occ]').forEach((b) => {
          b.onclick = () => navigate('notifications/' + b.dataset.nuuid + '/occurrences/' + b.dataset.groupingOcc + '/grouping');
        });
        const rb = $('#occRecruit');
        if (rb) rb.onclick = async () => {
          if (!(await confirmDialog('この通知の募集メッセージをチャンネルへ投稿します。', { okLabel: '送信する' }))) return;
          await withBusy(rb, async () => {
            try { const r = await api('/notifications/' + notifUuid + '/recruit', { method: 'POST' });
              toast(r && r.message ? r.message : '募集を送信しました'); } catch (e) { toast(e.message, true); }
          });
        };
        document.querySelectorAll('[data-decide]').forEach((b) => {
          b.onclick = async () => {
            if (!(await confirmDialog('この日時を開催として確定し、他の候補をすべて取り下げます。', { okLabel: '確定する' }))) return;
            try { await api('/notifications/' + b.dataset.nuuid + '/decide',
              { method: 'POST', body: JSON.stringify({ occurrence_uuid: b.dataset.decide }) });
              toast('確定しました'); refreshNotifsThen(() => loadOccurrences(notifUuid)); } catch (e) { toast(e.message, true); }
          };
        });
        document.querySelectorAll('[data-undecide]').forEach((b) => {
          b.onclick = async () => {
            if (!(await confirmDialog('確定を解除し、取り下げた候補を元に戻します。', { okLabel: '解除する' }))) return;
            try { await api('/notifications/' + b.dataset.undecide + '/undecide', { method: 'POST' });
              toast('解除しました'); refreshNotifsThen(() => loadOccurrences(notifUuid)); } catch (e) { toast(e.message, true); }
          };
        });
        for (const o of occs) loadOccTally(o.uuid);
      }
      function renderAssignments(occUuid, list) {
        const rows = (list || []).map((a) => `<tr><td>#${a.number}</td><td>${esc(a.name || a.user_id)}</td><td class="muted">${esc(a.user_id)}</td></tr>`).join('');
        $('#assignBox').innerHTML = `<h3 style="margin-top:14px">番号割り当て</h3>
          ${list && list.length ? `<table><thead><tr><th>番号</th><th>表示名</th><th>User ID</th></tr></thead><tbody>${rows}</tbody></table>`
            : '<p class="muted">割り当てはまだありません。</p>'}
          <div class="actions" style="margin-top:10px"><button class="btn" id="runAssign" data-occ="${esc(occUuid)}">番号割り当てを実行</button></div>`;
        $('#runAssign').onclick = async () => {
          if (!(await confirmDialog('この開催回で番号割り当てを実行します。', { okLabel: '実行する' }))) return;
          try { const res = await api('/occurrences/' + occUuid + '/assign', { method: 'POST' });
            toast(`割り当て実行: 新規 ${res && res.assigned ? res.assigned.length : 0} 名`);
            renderAssignments(occUuid, res && res.all ? res.all : []); } catch (e) { toast(e.message, true); }
        };
      }
      async function loadAssignments(occUuid) {
        try { renderAssignments(occUuid, await api('/occurrences/' + occUuid + '/assignments')); } catch (e) { toast(e.message, true); }
      }

      // ----- グループ分け（ADR 0015）-----
      // groupingState: 現在開いているグループ分けの状態を保持する。
      // - occId / notifId: 対象
      // - view: API から取得した GroupingView（grouping/groups/pool/diff）
      // - constraints: その通知のペア制約一覧
      // - sortables: SortableJS インスタンス配列（cleanup 用）
      // - dirty: 保存が必要な変更があるか
      const groupingState = { occUuid: null, notifUuid: null, view: null, constraints: [], sortables: [], dirty: false };

      async function openGroupingDialog(occUuid, notifUuid) {
        groupingState.occUuid = occUuid;
        groupingState.notifUuid = notifUuid;
        groupingState.dirty = false;
        $('#groupingErr').textContent = '';
        const dlg = $('#groupingDialog');
        $('#groupingBox').innerHTML = '<p class="muted">読み込み中…</p>';
        openAsPage(dlg);
        $('#groupingClose').onclick = $('#groupingCancel').onclick = attemptCloseGrouping;
        const gcrumb = $('#groupingCrumbBack');
        if (gcrumb) gcrumb.onclick = (e) => { e.preventDefault(); attemptCloseGrouping(); };
        try {
          await reloadGroupingView();
          $('#groupingSave').onclick = (e) => withBusy(e.currentTarget, saveGroupingMembers);
          $('#groupingAnnounce').onclick = (e) => withBusy(e.currentTarget, announceGrouping);
        } catch (e) { toast(e.message, true); }
      }
      async function attemptCloseGrouping() {
        if (groupingState.dirty) {
          if (!(await confirmDialog('未保存の変更があります。閉じてもよろしいですか？', { okLabel: '閉じる', danger: true }))) return;
        }
        teardownSortables();
        groupingState.dirty = false;
        closeAsPage($('#groupingDialog'));
        // 親（開催回ページ）へ戻る
        if (groupingState.notifUuid) {
          navigate('notifications/' + groupingState.notifUuid + '/occurrences');
        }
      }
      function teardownSortables() {
        for (const s of groupingState.sortables) { try { s.destroy(); } catch (_) {} }
        groupingState.sortables = [];
      }
      async function reloadGroupingView() {
        const occUuid = groupingState.occUuid;
        const view = await api('/occurrences/' + occUuid + '/grouping');
        groupingState.view = view;
        try {
          groupingState.constraints = await api('/notifications/' + groupingState.notifUuid + '/constraints');
        } catch (_) { groupingState.constraints = []; }
        renderGroupingDialog();
      }
      function renderGroupingDialog() {
        const view = groupingState.view;
        const groupCount = view.grouping ? view.grouping.group_count : 2;
        const toolbar = `
          <div class="grouping-toolbar">
            <label>グループ数</label>
            <input type="number" id="groupingCount" min="1" max="50" value="${groupCount}" style="width:80px" />
            <button class="btn sm secondary" id="groupingApplyCount">反映</button>
            <button class="btn sm secondary" id="groupingAuto">🎲 自動配置</button>
            <button class="btn sm ghost" id="groupingClear">クリア</button>
            <span class="spacer"></span>
            <span class="muted" style="font-size:12px">${view.grouping ? '保存済み' : '未保存'} · 参加 ${countCurrentParticipants(view)}名</span>
          </div>`;
        const poolCol = renderColumn({ id: 'pool', name: '未割り当て', members: view.pool }, true);
        const groupCols = (view.groups || []).map((g) => renderColumn(g, false)).join('');
        const board = `<div class="grouping-board" id="groupingBoard">${poolCol}${groupCols}</div>`;
        const alerts = `<div id="groupingAlerts"></div>`;
        const constraintsPanel = renderConstraintsPanel();
        $('#groupingBox').innerHTML = toolbar + board + alerts + constraintsPanel;
        wireGroupingDialogControls();
        wireSortables();
        evaluateAndPaintViolations();
      }
      function countCurrentParticipants(view) {
        let n = view.pool.length;
        for (const g of (view.groups || [])) {
          for (const m of g.members) {
            if (!view.diff.no_longer_participating.some((x) => x.user_id === m.user_id && x.group_id === g.id)) n++;
          }
        }
        return n;
      }
      function renderColumn(g, isPool) {
        const cls = isPool ? 'grouping-col pool' : 'grouping-col';
        // DOM data 属性として保持する識別子。pool は文字列、それ以外は group の UUID。
        const groupKey = isPool ? 'pool' : esc(g.uuid);
        const cards = (g.members || []).map((m) => renderCard(m, isPool ? null : g.id)).join('');
        const head = isPool
          ? `<div class="grouping-col-head"><span class="name">📥 ${esc(g.name)}</span><span class="count" id="count-${groupKey}">${(g.members || []).length}</span></div>`
          : `<div class="grouping-col-head"><span class="name" data-group-uuid="${esc(g.uuid)}" contenteditable="false" title="クリックで名前変更">${esc(g.name)}</span><span class="count" id="count-${groupKey}">${(g.members || []).length}</span></div>`;
        return `<div class="${cls}" data-group-key="${groupKey}">
          ${head}
          <div class="grouping-cards" data-group-key="${groupKey}">${cards}</div>
        </div>`;
      }
      function renderCard(m, currentGroupId) {
        const view = groupingState.view;
        const isGone = currentGroupId !== null && view.diff.no_longer_participating.some(
          (x) => x.user_id === m.user_id && x.group_id === currentGroupId,
        );
        const isNew = currentGroupId === null && view.diff.newly_participating.some((x) => x.user_id === m.user_id);
        const badge = isGone ? '<span class="badge gone">不参加に変更</span>'
          : (isNew && view.grouping ? '<span class="badge new">新規参加</span>' : '');
        return `<div class="grouping-card${isGone ? ' no-longer' : ''}" data-user-id="${esc(m.user_id)}">
          <span>${esc(m.name)}</span>${badge}
        </div>`;
      }
      function wireGroupingDialogControls() {
        $('#groupingApplyCount').onclick = (e) => withBusy(e.currentTarget, async () => {
          const gc = Number($('#groupingCount').value);
          if (!Number.isInteger(gc) || gc < 1 || gc > 50) return toast('グループ数は 1〜50', true);
          try {
            // 未保存の現在の配置をまず保存してからグループ数を変更（誤って消えないように）
            if (groupingState.view.grouping) await saveGroupingMembers(true);
            await api('/occurrences/' + groupingState.occUuid + '/grouping',
              { method: 'PUT', body: JSON.stringify({ group_count: gc }) });
            await reloadGroupingView();
            groupingState.dirty = false;
          } catch (e) { toast(e.message, true); }
        });
        $('#groupingAuto').onclick = (e) => withBusy(e.currentTarget, async () => {
          if (!groupingState.view.grouping) {
            const gc = Number($('#groupingCount').value);
            if (!Number.isInteger(gc) || gc < 1) return toast('グループ数を指定してください', true);
            await api('/occurrences/' + groupingState.occUuid + '/grouping',
              { method: 'PUT', body: JSON.stringify({ group_count: gc }) });
          }
          try {
            await api('/occurrences/' + groupingState.occUuid + '/grouping/auto-assign', { method: 'POST' });
            await reloadGroupingView();
            groupingState.dirty = false;
            toast('自動配置しました');
          } catch (e) { toast(e.message, true); }
        });
        $('#groupingClear').onclick = async () => {
          if (!(await confirmDialog('全メンバーをプールに戻します。', { okLabel: 'クリア' }))) return;
          if (!groupingState.view.grouping) return;
          try {
            const assignments = groupingState.view.groups.map((g) => ({ group_uuid: g.uuid, user_ids: [] }));
            await api('/occurrences/' + groupingState.occUuid + '/grouping/members',
              { method: 'PUT', body: JSON.stringify({ assignments }) });
            await reloadGroupingView();
            groupingState.dirty = false;
          } catch (e) { toast(e.message, true); }
        };
        // グループ名のインライン編集
        document.querySelectorAll('#groupingBoard .grouping-col-head .name[data-group-uuid]').forEach((el) => {
          el.onclick = () => {
            el.contentEditable = 'true';
            el.focus();
            const range = document.createRange();
            range.selectNodeContents(el);
            const sel = window.getSelection();
            sel.removeAllRanges(); sel.addRange(range);
          };
          el.onblur = async () => {
            el.contentEditable = 'false';
            const newName = el.textContent.trim().slice(0, 50);
            if (!newName) { el.textContent = '（名無し）'; return; }
            const guuid = el.dataset.groupUuid;
            try {
              await api('/occurrences/' + groupingState.occUuid + '/grouping/rename',
                { method: 'PUT', body: JSON.stringify({ group_uuid: guuid, name: newName }) });
              const g = groupingState.view.groups.find((x) => x.uuid === guuid);
              if (g) g.name = newName;
            } catch (e) { toast(e.message, true); }
          };
          el.onkeydown = (ev) => {
            if (ev.key === 'Enter') { ev.preventDefault(); el.blur(); }
            if (ev.key === 'Escape') { ev.preventDefault(); el.blur(); }
          };
        });
      }
      function wireSortables() {
        teardownSortables();
        if (typeof window.Sortable === 'undefined') { console.warn('SortableJS not loaded'); return; }
        const cardsEls = document.querySelectorAll('#groupingBoard .grouping-cards');
        cardsEls.forEach((el) => {
          const s = window.Sortable.create(el, {
            group: 'grouping',
            animation: 150,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: () => {
              groupingState.dirty = true;
              recalcCounts();
              evaluateAndPaintViolations();
            },
          });
          groupingState.sortables.push(s);
        });
      }
      function recalcCounts() {
        document.querySelectorAll('#groupingBoard .grouping-cards').forEach((el) => {
          const key = el.dataset.groupKey;
          const c = el.querySelectorAll('.grouping-card').length;
          const counter = document.querySelector('#count-' + (key === 'pool' ? 'pool' : CSS.escape(key)));
          if (counter) counter.textContent = String(c);
        });
      }
      function collectCurrentAssignments() {
        // 現状の DOM から、各グループに含まれるユーザーID配列を抽出する（group_uuid キー）
        const assignments = [];
        const groupOf = new Map(); // user_id -> group_uuid (string) or null for pool
        document.querySelectorAll('#groupingBoard .grouping-cards').forEach((el) => {
          const key = el.dataset.groupKey;
          const userIds = Array.from(el.querySelectorAll('.grouping-card')).map((c) => c.dataset.userId);
          if (key !== 'pool') {
            assignments.push({ group_uuid: key, user_ids: userIds });
            for (const u of userIds) groupOf.set(u, key);
          } else {
            for (const u of userIds) groupOf.set(u, null);
          }
        });
        return { assignments, groupOf };
      }
      function evaluateAndPaintViolations() {
        // カードのハイライトをいったんクリア
        document.querySelectorAll('#groupingBoard .grouping-card').forEach((el) => {
          el.classList.remove('violated-required');
          el.classList.remove('violated-preferred');
        });
        const { groupOf } = collectCurrentAssignments();
        const required = [], preferred = [];
        for (const c of groupingState.constraints) {
          const ga = groupOf.get(c.user_id_a);
          const gb = groupOf.get(c.user_id_b);
          if (ga === undefined || gb === undefined) continue;
          if (ga === null || gb === null) continue; // 片方プールはスキップ
          const violated = c.direction === 'together' ? ga !== gb : ga === gb;
          if (!violated) continue;
          const list = c.strength === 'required' ? required : preferred;
          list.push(c);
        }
        for (const c of required) {
          highlightCard(c.user_id_a, 'violated-required');
          highlightCard(c.user_id_b, 'violated-required');
        }
        for (const c of preferred) {
          highlightCard(c.user_id_a, 'violated-preferred');
          highlightCard(c.user_id_b, 'violated-preferred');
        }
        renderViolationAlerts(required, preferred);
      }
      function highlightCard(userId, cls) {
        document.querySelectorAll(`.grouping-card[data-user-id="${cssEscape(userId)}"]`).forEach((el) => {
          // 必須違反は推奨より強い表示にする
          if (cls === 'violated-required' || !el.classList.contains('violated-required')) el.classList.add(cls);
        });
      }
      function cssEscape(s) { return String(s).replace(/[^\w-]/g, '\\$&'); }
      function nameOfUser(userId) {
        const view = groupingState.view;
        for (const g of (view.groups || [])) { const m = g.members.find((x) => x.user_id === userId); if (m) return m.name; }
        const p = view.pool.find((x) => x.user_id === userId); if (p) return p.name;
        return userId;
      }
      function renderViolationAlerts(required, preferred) {
        const el = $('#groupingAlerts');
        if (!required.length && !preferred.length) { el.innerHTML = ''; return; }
        const reqItems = required.map((c) => `<li class="err">必須: ${esc(nameOfUser(c.user_id_a))} と ${esc(nameOfUser(c.user_id_b))} は${c.direction === 'together' ? '同じ' : '別の'}グループにしてください</li>`).join('');
        const prefItems = preferred.map((c) => `<li class="warn">推奨: ${esc(nameOfUser(c.user_id_a))} と ${esc(nameOfUser(c.user_id_b))} は${c.direction === 'together' ? 'なるべく同じ' : 'なるべく別の'}グループに</li>`).join('');
        el.innerHTML = `<div class="grouping-alerts ${required.length ? 'has-error' : ''}">
          <h4>制約違反 (必須 ${required.length} / 推奨 ${preferred.length})</h4>
          <ul>${reqItems}${prefItems}</ul>
        </div>`;
      }
      function renderConstraintsPanel() {
        const view = groupingState.view;
        // 参加者の選択肢: 現在参加（pool + 各グループのうち no_longer でない）
        const candidates = [];
        const seen = new Set();
        for (const p of view.pool) { if (!seen.has(p.user_id)) { candidates.push(p); seen.add(p.user_id); } }
        for (const g of (view.groups || [])) {
          for (const m of g.members) {
            const gone = view.diff.no_longer_participating.some((x) => x.user_id === m.user_id && x.group_id === g.id);
            if (!gone && !seen.has(m.user_id)) { candidates.push(m); seen.add(m.user_id); }
          }
        }
        const opts = candidates.map((c) => `<option value="${esc(c.user_id)}">${esc(c.name)}</option>`).join('');
        const rows = groupingState.constraints.map((c) => `
          <div class="grouping-constraint-row" data-cuuid="${esc(c.uuid)}">
            <span>${esc(nameOfUser(c.user_id_a))} ${c.direction === 'together' ? '🤝' : '🚫'} ${esc(nameOfUser(c.user_id_b))}</span>
            <span class="pill ${c.strength === 'required' ? 'off' : 'on'}" style="font-size:11px">${c.strength === 'required' ? '必須' : '推奨'}</span>
            <span class="spacer"></span>
            <button class="btn sm ghost" data-del-constraint="${esc(c.uuid)}">削除</button>
          </div>`).join('');
        return `<div class="grouping-constraints-panel">
          <h4>ペア制約（この通知の全開催回で共有）</h4>
          <div class="grouping-constraints-list" id="constraintsList">
            ${rows || '<p class="muted" style="font-size:12px;margin:0">まだ制約はありません。</p>'}
          </div>
          <div class="grouping-constraints-form">
            <select id="cUserA"><option value="">メンバーA</option>${opts}</select>
            <select id="cUserB"><option value="">メンバーB</option>${opts}</select>
            <select id="cDirection">
              <option value="together">🤝 同じグループに</option>
              <option value="apart">🚫 別のグループに</option>
            </select>
            <select id="cStrength">
              <option value="required">必須</option>
              <option value="preferred">推奨</option>
            </select>
            <button class="btn sm" id="cAdd">＋ 追加</button>
          </div>
        </div>`;
      }
      // ペア制約パネル内のボタンをバインド（renderConstraintsPanel 後）
      function wireConstraintsPanel() {
        const add = $('#cAdd'); if (!add) return;
        add.onclick = async () => {
          const a = $('#cUserA').value, b = $('#cUserB').value;
          if (!a || !b || a === b) return toast('異なる 2 名を選んでください', true);
          const direction = $('#cDirection').value, strength = $('#cStrength').value;
          try {
            await api('/notifications/' + groupingState.notifUuid + '/constraints',
              { method: 'POST', body: JSON.stringify({ user_id_a: a, user_id_b: b, direction, strength }) });
            await reloadGroupingView();
            wireConstraintsPanel();
          } catch (e) { toast(e.message, true); }
        };
        document.querySelectorAll('[data-del-constraint]').forEach((b) => {
          b.onclick = async () => {
            const cuuid = b.dataset.delConstraint;
            try {
              await api('/notifications/' + groupingState.notifUuid + '/constraints/' + cuuid, { method: 'DELETE' });
              await reloadGroupingView();
              wireConstraintsPanel();
            } catch (e) { toast(e.message, true); }
          };
        });
      }
      // renderGroupingDialog 後に呼ばれるよう、wireGroupingDialogControls を拡張するか、
      // ここでパッチを当てる: renderGroupingDialog の末尾に wireConstraintsPanel を追加
      const _origWireGroupingDialogControls = wireGroupingDialogControls;
      wireGroupingDialogControls = function () {
        _origWireGroupingDialogControls.apply(this, arguments);
        wireConstraintsPanel();
      };
      async function saveGroupingMembers(silent) {
        if (!groupingState.view || !groupingState.view.grouping) {
          const gc = Number($('#groupingCount').value);
          if (!Number.isInteger(gc) || gc < 1) { toast('グループ数を指定してください', true); return; }
          await api('/occurrences/' + groupingState.occUuid + '/grouping',
            { method: 'PUT', body: JSON.stringify({ group_count: gc }) });
          await reloadGroupingView();
        }
        const { assignments, groupOf } = collectCurrentAssignments();
        const requiredViolations = groupingState.constraints.filter((c) => {
          const ga = groupOf.get(c.user_id_a), gb = groupOf.get(c.user_id_b);
          if (ga == null || gb == null) return false;
          if (c.strength !== 'required') return false;
          return c.direction === 'together' ? ga !== gb : ga === gb;
        });
        if (requiredViolations.length > 0) {
          const ok = await confirmDialog(`必須制約に ${requiredViolations.length} 件の違反があります。このまま保存しますか？`, { okLabel: '保存する', danger: true });
          if (!ok) return;
        }
        try {
          await api('/occurrences/' + groupingState.occUuid + '/grouping/members',
            { method: 'PUT', body: JSON.stringify({ assignments }) });
          groupingState.dirty = false;
          if (!silent) toast('保存しました');
          await reloadGroupingView();
        } catch (e) { toast(e.message, true); }
      }
      async function announceGrouping() {
        if (groupingState.dirty) {
          if (!(await confirmDialog('未保存の変更があります。保存してから投稿しますか？', { okLabel: '保存して投稿' }))) return;
          await saveGroupingMembers(true);
        }
        if (!(await confirmDialog('現在のグループ分けをチャンネルへ投稿します。', { okLabel: '投稿する' }))) return;
        try {
          const r = await api('/occurrences/' + groupingState.occUuid + '/grouping/announce', { method: 'POST' });
          toast(r && r.ok ? '投稿しました' : '投稿に失敗しました', !(r && r.ok));
        } catch (e) { toast(e.message, true); }
      }

      // ================= メンバー区分 =================
      async function loadSegments() {
        let segs = [];
        try { segs = await api('/segments?guild_id=' + encodeURIComponent(guild.id)); } catch (e) { toast(e.message, true); }
        cacheSegments = segs;
        const rows = segs.map((s) => `<div class="listrow">
          <div><div style="font-weight:600">${esc(s.name)}</div>
            <div class="muted" style="font-size:12px;margin-top:2px">${s.mention_role_id
              ? `<span class="pill on">ロール管理</span> <span class="pill">${esc(s.mention_role_id)}</span>`

          <div class="actions">
            <button class="btn sm secondary" data-smembers="${esc(s.uuid)}">メンバー</button>
            <button class="btn sm ghost" data-sedit="${esc(s.uuid)}">編集</button>
            <button class="btn sm danger" data-sdel="${esc(s.uuid)}">削除</button>
          </div></div>`).join('');
        $('#sec-segments').innerHTML = `<div class="sec-head"><h2>メンバー区分 (${segs.length})</h2>

            <div class="modal-body">
              <input type="hidden" id="segId" />
              <div class="row">
                <div><label>名前</label><input id="segName" placeholder="例: キャスト" /></div>
                <div><label>ロール / @everyone（任意）<span class="muted">設定するとメンバーをこのロールから自動同期＋メンション先に</span></label><input id="segRole" placeholder="未設定＝手動管理" /></div>
              </div>

        $('#segSave').onclick = (e) => withBusy(e.currentTarget, saveSegment);
        $('#segNewBtn') && ($('#segNewBtn').onclick = () => { resetSegForm(); $('#segDialog').showModal(); $('#segName').focus(); });
        $('#segClose').onclick = () => $('#segDialog').close();
        $('#segCancel').onclick = () => $('#segDialog').close();
        document.querySelectorAll('#segMembersDialog [data-segm-close]').forEach((b) => { b.onclick = (e) => { e.preventDefault(); closeSegMembersPage(); }; });
        document.querySelectorAll('[data-sedit]').forEach((b) => { b.onclick = () => { fillSegForm(segs.find((s) => s.uuid === b.dataset.sedit)); $('#segDialog').showModal(); }; });
        document.querySelectorAll('[data-smembers]').forEach((b) => { b.onclick = () => navigate('segments/' + b.dataset.smembers + '/members'); });
        document.querySelectorAll('[data-sdel]').forEach((b) => {
          b.onclick = async () => {
            if (!(await confirmDialog('この区分を削除します。', { danger: true, okLabel: '削除' }))) return;
            try { await api('/segments/' + b.dataset.sdel, { method: 'DELETE' }); toast('削除しました'); loadSegments(); }
            catch (e) { toast(e.message, true); }
          };
        });
      }
      function resetSegForm() {
        $('#segId').value = ''; $('#segName').value = ''; $('#segRole').value = '';
        $('#segFormTitle').textContent = '新規区分';
      }
      function fillSegForm(s) {
        if (!s) return;
        $('#segId').value = s.uuid; $('#segName').value = s.name; $('#segRole').value = s.mention_role_id || '';
        $('#segFormTitle').textContent = '編集';
      }
      async function saveSegment() {
        const name = $('#segName').value.trim();
        if (!name) return toast('名前は必須です', true);
        const mention_role_id = $('#segRole').value.trim() || null;
        const uuid = $('#segId').value;
        try {
          if (uuid) { await api('/segments/' + uuid, { method: 'PUT', body: JSON.stringify({ name, mention_role_id }) }); toast('更新しました'); }
          else { await api('/segments', { method: 'POST', body: JSON.stringify({ guild_id: guild.id, name, mention_role_id }) }); toast('作成しました'); }
          try { $('#segDialog').close(); } catch (_) {}
          loadSegments();
        } catch (e) { toast(e.message, true); }

      // ----- 区分メンバー（手動ピッカー / ロール同期・ADR 0009） -----
      let cacheGuildMembers = null;
      async function loadSegmentMembers(segUuid) {
        const seg = cacheSegments.find((s) => s.uuid === segUuid);
        const roleManaged = !!(seg && seg.mention_role_id);
        const isEveryone = !!(seg && seg.mention_role_id === '@everyone');
        let list = [];
        try { list = await api('/segments/' + segUuid + '/members'); } catch (e) { return toast(e.message, true); }
        const rows = list.map((m) => {
          const paused = m.status === '休止中';
          const name = m.display_name || m.user_name || m.user_id;
          const delBtn = roleManaged ? '' : `<button class="btn sm danger" data-smdel="${esc(m.user_id)}">外す</button>`;
          return `<div class="pickrow">
            <div>${esc(name)} <span class="muted" style="font-size:12px">${esc(m.user_id)}</span>
              ${paused ? '<span class="pill off">休止中</span>' : '<span class="pill on">アクティブ</span>'}</div>
            <div class="actions">
              <button class="btn sm secondary" data-smtoggle="${esc(m.user_id)}" data-status="${paused ? '' : '休止中'}">${paused ? '再開' : '休止'}</button>
              ${delBtn}
            </div></div>`;
        }).join('');
        const synced = seg && seg.members_synced_at ? esc(seg.members_synced_at) : '未同期';
        const roleLabel = isEveryone ? '@everyone（全員）' : esc(seg ? seg.mention_role_id : '');
        const emptyMsg = roleManaged
          ? 'まだ同期されていません。下の「ロールから同期」を実行してください。'
          : 'まだ誰も所属していません。下のピッカーから追加できます。';
        const panel = roleManaged
          ? `<div class="summary">🔗 <b>ロール管理区分</b>：メンバーは Discord ロール <code>${roleLabel}</code> から自動同期されます（手動の追加/外すは不可・休止は可）。最終同期: ${synced}</div>
             ${isEveryone ? '<p class="muted" style="font-size:12px;color:var(--warn)">⚠️ @everyone はサーバー全員が対象です。リマインド/ノルマの DM も全員へ届きます。</p>' : ''}
             <div class="actions"><button class="btn" id="segSyncBtn">🔄 ロールから同期</button></div>`
          : `<h3 style="margin-top:14px">メンバーを追加</h3>
             <div class="search"><input id="memSearch" placeholder="サーバー参加者を検索（User ID 入力は不要）" /></div>
             <div id="memPicker" style="margin-top:8px"><p class="muted">読み込み中…</p></div>`;
        $('#segMembersTitle').textContent = `区分メンバー: ${seg ? seg.name : segUuid} (${list.length})`;
        $('#segMembersBox').innerHTML = `${list.length ? rows : '<div class="empty">' + emptyMsg + '</div>'}
          ${panel}`;
        openAsPage($('#segMembersDialog'));
        document.querySelectorAll('[data-smtoggle]').forEach((b) => {
          b.onclick = async () => {
            try { await api('/segments/' + segUuid + '/members/' + encodeURIComponent(b.dataset.smtoggle),
              { method: 'PUT', body: JSON.stringify({ status: b.dataset.status }) });
              toast('更新しました'); loadSegmentMembers(segUuid); } catch (e) { toast(e.message, true); }
          };
        });
        document.querySelectorAll('[data-smdel]').forEach((b) => {
          b.onclick = async () => {
            if (!(await confirmDialog('このメンバーを区分から外します。', { danger: true, okLabel: '外す' }))) return;
            try { await api('/segments/' + segUuid + '/members/' + encodeURIComponent(b.dataset.smdel), { method: 'DELETE' });
              toast('外しました'); loadSegmentMembers(segUuid); } catch (e) { toast(e.message, true); }
          };
        });

        if (roleManaged) {
          $('#segSyncBtn').onclick = (e) => withBusy(e.currentTarget, async () => {
            const warn = isEveryone
              ? 'Discord ロール @everyone（サーバー全員）からメンバーを同期します。ロール非保有者は区分から外れ、全員がリマインド/ノルマ DM の対象になります。'
              : 'Discord ロールからメンバーを同期します。ロール非保有の現メンバーは区分から外れます。';
            if (!(await confirmDialog(warn, { okLabel: '同期する', danger: true }))) return;
            try {
              const r = await api('/segments/' + segUuid + '/sync-from-role', { method: 'POST' });
              toast(r && r.message ? r.message : '同期しました');
              try { cacheSegments = await api('/segments?guild_id=' + encodeURIComponent(guild.id)); } catch (_) {}
              loadSegmentMembers(segUuid);
            } catch (e) { toast(e.message, true); }
          });
          return;
        }

        const already = new Set(list.map((m) => m.user_id));
        if (!cacheGuildMembers) {
          try { cacheGuildMembers = await api('/guilds/' + guild.id + '/members'); }
          catch (e) { $('#memPicker').innerHTML = `<p class="muted">サーバー参加者を取得できませんでした（${esc(e.message)}）。Server Members Intent の有効化が必要な場合があります。</p>`; return; }
        }
        const render = (q) => {
          const ql = (q || '').toLowerCase();
          const cand = cacheGuildMembers
            .filter((m) => !already.has(m.user_id))
            .filter((m) => !ql || (m.display_name || '').toLowerCase().includes(ql) || (m.user_name || '').toLowerCase().includes(ql))
            .slice(0, 30);
          $('#memPicker').innerHTML = cand.length ? cand.map((m) => `<div class="pickrow">
            <div>${esc(m.display_name || m.user_name || m.user_id)}
              <span class="muted" style="font-size:12px">${esc(m.user_name || '')}</span></div>
            <button class="btn sm" data-add="${esc(m.user_id)}">追加</button></div>`).join('')
            : '<p class="muted">該当する参加者がいません。</p>';
          document.querySelectorAll('[data-add]').forEach((b) => {
            b.onclick = async () => {
              const m = cacheGuildMembers.find((x) => x.user_id === b.dataset.add);
              try {
                await api('/segments/' + segUuid + '/members', { method: 'POST',
                  body: JSON.stringify({ user_id: m.user_id, user_name: m.user_name, display_name: m.display_name }) });
                toast('追加しました'); loadSegmentMembers(segUuid);
              } catch (e) { toast(e.message, true); }
            };
          });
        };
        render('');
        $('#memSearch').oninput = (e) => render(e.target.value);
      }

            { id: 'notif', header: '通知', accessor: (r) => r.notification_name || '' },
            { id: 'occ', header: '開催日', accessor: (r) => r.occurrence_date || '' },
            { id: 'kind', header: '種別', accessor: (r) => kindLabel[r.kind] || r.kind },
            { id: 'to', header: '宛先', accessor: (r) => r.user_id || '（チャンネル）' },
            { id: 'status', header: '結果', accessor: (r) => r.status,
              render: (v) => v === 'sent' ? '<span class="pill on">送信</span>' : v === 'failed' ? '<span class="pill" style="color:var(--danger);border-color:var(--danger)">失敗</span>' : `<span class="pill">${esc(v)}</span>` },
            { id: 'error', header: '詳細', accessor: (r) => r.error || '', render: (v) => v ? `<span class="muted">${esc(v)}</span>` : '' },
          ],
          rows: logs,
        });
      }

      // ================= セットアップ ウィザード =================
      async function loadSetup() {
        let st = null;
        try { st = await api('/setup/status'); } catch (e) { return toast(e.message, true); }
        const secretRow = (key, label) => {
          const ok = st.secrets[key];
          return `<div class="pickrow"><div>${ok ? '✅' : '⚠️'} <b>${esc(key)}</b><br>
            <span class="muted" style="font-size:12px">${esc(label)}</span></div>
            <span class="pill ${ok ? 'on' : 'off'}">${ok ? '設定済み' : '未設定'}</span></div>`;
        };
        const endpoint = st.interaction_endpoint_url;
        $('#sec-setup').innerHTML = `
          <h2>⚙️ セットアップ</h2>
          <p class="muted">初期設定をここで完了できます。上から順に進めてください。</p>

          <fieldset><legend>1. シークレットの確認</legend>
            <p class="muted" style="font-size:13px">Cloudflare の管理画面（Settings → Variables and Secrets）で設定します。未設定があると Bot は動きません。</p>
            ${secretRow('DISCORD_PUBLIC_KEY', '署名検証用の公開鍵（Discord → General Information）')}
            ${secretRow('DISCORD_APPLICATION_ID', 'アプリID（Discord → General Information）')}
            ${secretRow('DISCORD_BOT_TOKEN', 'Bot のトークン（Discord → Bot）')}
            ${secretRow('ADMIN_TOKEN', 'この管理画面のパスワード（自分で決めた文字列）')}
            <div class="actions" style="margin-top:8px"><button class="btn sm secondary" id="setupReload">再読み込み</button></div>
          </fieldset>

          <fieldset><legend>2. スラッシュコマンドを登録</legend>
            <p class="muted" style="font-size:13px">/recruit /help /manage の 3 つを Discord に登録します（このサーバーへ即時反映）。</p>
            <div class="actions"><button class="btn" id="setupRegister">コマンドを登録</button></div>
            <div id="setupRegisterResult" class="muted" style="font-size:13px;margin-top:8px"></div>
          </fieldset>

          <fieldset><legend>3. Interaction Endpoint URL を Discord に設定</legend>
            <p class="muted" style="font-size:13px">下の URL をコピーし、Discord Developer Portal → General Information の
              「Interactions Endpoint URL」に貼り付けて保存してください。</p>
            <div class="pickrow"><code style="word-break:break-all">${esc(endpoint)}</code>
              <button class="btn sm" id="setupCopy">コピー</button></div>
            <p class="muted" style="font-size:13px;margin-top:8px">続けて Discord → Bot の
              <b>Server Members Intent</b> を ON にしてください（メンバー一覧の取得に必要）。</p>
          </fieldset>

          <fieldset><legend>4. 中身を設定する</legend>
            <p class="muted" style="font-size:13px">左メニューの「メンバー区分」→「通知」の順に作成し、メンバーを登録すれば完了です。</p>
          </fieldset>`;
        $('#setupReload').onclick = loadSetup;
        $('#setupCopy').onclick = async () => {
          try { await navigator.clipboard.writeText(endpoint); toast('コピーしました'); }
          catch (_) { toast('コピーできませんでした。URL を手動で選択してください', true); }
        };
        $('#setupRegister').onclick = (ev) => withBusy(ev.currentTarget, async () => {
          const res = $('#setupRegisterResult');
          res.textContent = '登録中…';
          try {
            const r = await api('/setup/register-commands', { method: 'POST', body: JSON.stringify({ guild_id: guild.id }) });
            if (r && r.ok) { res.textContent = `✅ 登録しました: ${(r.names || []).map((n) => '/' + n).join(' ')}`; toast('コマンドを登録しました'); }
            else { res.textContent = '⚠️ ' + ((r && r.error) || '登録に失敗しました'); }
          } catch (e) { res.textContent = '⚠️ ' + e.message; toast(e.message, true); }
        });
      }

      // ================= 認証・起動 =================
      $('#tokenSave').onclick = () => {
        token = $('#tokenInput').value.trim();
        localStorage.setItem(TOKEN_KEY, token);
        boot();
      };
      $('#logout').onclick = $('#pickerLogout').onclick = () => {
        localStorage.removeItem(TOKEN_KEY); token = ''; cacheGuilds = null; showGate();
      };

      function boot() {
        if (!token) return showGate();
        const saved = localStorage.getItem(GUILD_KEY);
        // 新形式 `g/<gid>/...`、旧形式 `<gid>`、空のいずれも許容（旧→新は自動補正）
        const { guildId } = parseHash();
        if (saved) {
          try {
            const g = JSON.parse(saved);
            if (!guildId || guildId === g.id) {
              guild = g;
              showWorkspace();
              // 初期ハッシュが `g/<gid>/...` 形式ならルータでモーダル復帰、なければ何もしない
              handleHashRoute();
              return;
            }
          } catch (_) {}
        }
        showPicker();
      }
      boot();
    </script>
  </body>
</html>
