<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EventBot 管理</title>
    <style>
      :root {
        --bg: #0f1117; --panel: #1a1d27; --border: #2a2e3a; --text: #e6e8ee;
        --muted: #9aa0ad; --accent: #5865f2; --danger: #ed4245; --ok: #3ba55d;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; }
      header { padding: 16px 20px; border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
      header h1 { font-size: 16px; margin: 0; }
      .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
      .tabs button { background: none; border: none; color: var(--muted);
        padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; }
      .tabs button.active { background: var(--panel); color: var(--text); }
      main { padding: 20px; max-width: 960px; margin: 0 auto; }
      .panel { background: var(--panel); border: 1px solid var(--border);
        border-radius: 12px; padding: 20px; margin-bottom: 16px; }
      h2 { margin-top: 0; }
      h3 { margin-bottom: 8px; }
      label { display: block; color: var(--muted); margin: 10px 0 4px; }
      input, select, textarea { width: 100%; padding: 8px 10px; background: var(--bg);
        border: 1px solid var(--border); border-radius: 8px; color: var(--text);
        font-family: inherit; font-size: 14px; }
      label.inline { display: inline-flex; align-items: center; gap: 8px; margin: 10px 0 0; }
      label.inline input { width: auto; }
      button.btn { background: var(--accent); color: #fff; border: none;
        padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
      button.btn.secondary { background: var(--border); }
      button.btn.danger { background: var(--danger); }
      button.btn.sm { padding: 4px 10px; font-size: 13px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border);
        vertical-align: top; }
      th { color: var(--muted); font-weight: 600; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
      .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 16px;
        border-radius: 8px; background: var(--ok); color: #fff; opacity: 0;
        transition: opacity .2s; pointer-events: none; max-width: 60vw; z-index: 10; }
      .toast.show { opacity: 1; }
      .toast.err { background: var(--danger); }
      .hidden { display: none; }
      .muted { color: var(--muted); }
      .pill { display: inline-block; padding: 1px 8px; border-radius: 999px;
        font-size: 12px; border: 1px solid var(--border); }
      .pill.on { background: rgba(59,165,93,.15); color: var(--ok); border-color: var(--ok); }
      .pill.off { color: var(--muted); }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .formgrid { margin-top: 8px; }
      fieldset { border: 1px solid var(--border); border-radius: 8px; margin: 12px 0; padding: 12px; }
      legend { color: var(--muted); padding: 0 6px; }
    </style>
  </head>
  <body>
    <!-- トークンゲート -->
    <div id="gate" class="panel hidden" style="max-width: 420px; margin: 80px auto;">
      <h1>管理トークン</h1>
      <p class="muted">ADMIN_TOKEN を入力してください。</p>
      <input id="tokenInput" type="password" placeholder="ADMIN_TOKEN" />
      <div style="margin-top: 12px;"><button class="btn" id="tokenSave">ログイン</button></div>
    </div>

    <div id="app" class="hidden">
      <header>
        <h1>🗓 EventBot 管理</h1>
        <nav class="tabs">
          <button data-tab="events" class="active">イベント</button>
          <button data-tab="notifications">通知</button>
          <button data-tab="segments">区分</button>
          <button data-tab="members">メンバー</button>
          <button data-tab="records">記録</button>
        </nav>
        <span style="flex: 1"></span>
        <button class="btn secondary" id="logout">ログアウト</button>
      </header>
      <main>
        <section id="tab-events" class="panel"></section>
        <section id="tab-notifications" class="panel hidden"></section>
        <section id="tab-segments" class="panel hidden"></section>
        <section id="tab-members" class="panel hidden"></section>
        <section id="tab-records" class="panel hidden"></section>
      </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const TOKEN_KEY = 'choiemu_admin_token';
      let token = localStorage.getItem(TOKEN_KEY) || '';

      const $ = (s) => document.querySelector(s);
      function esc(v) {
        return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
      function toast(msg, err) {
        const t = $('#toast');
        t.textContent = msg;
        t.className = 'toast show' + (err ? ' err' : '');
        setTimeout(() => (t.className = 'toast'), 2600);
      }

      async function api(path, opts = {}) {
        const res = await fetch('/api/admin' + path, {
          ...opts,
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
            ...(opts.headers || {}),
          },
        });
        if (res.status === 401) {
          showGate();
          throw new Error('認証に失敗しました');
        }
        if (!res.ok) {
          let detail = res.status;
          try {
            const body = await res.json();
            if (body && body.error) detail = res.status + ' ' + body.error;
          } catch (_) { /* noop */ }
          throw new Error('エラー: ' + detail);
        }
        return res.status === 204 ? null : res.json();
      }

      function showGate() {
        $('#app').classList.add('hidden');
        $('#gate').classList.remove('hidden');
      }
      function showApp() {
        $('#gate').classList.add('hidden');
        $('#app').classList.remove('hidden');
        loadEvents();
      }

      // 共有キャッシュ（select 構築用）
      let cacheEvents = [];
      let cacheSegments = [];

      // ================= イベント =================
      async function loadEvents() {
        const events = await api('/events');
        cacheEvents = events;
        const rows = events
          .map(
            (e) => `<tr>
              <td class="muted">${e.id}</td>
              <td><input data-ename="${e.id}" value="${esc(e.name)}" /></td>
              <td class="muted">${esc((e.created_at || '').slice(0, 19))}</td>
              <td class="actions">
                <button class="btn sm" data-esave="${e.id}">保存</button>
                <button class="btn sm danger" data-edel="${e.id}">削除</button>
              </td></tr>`,
          )
          .join('');
        $('#tab-events').innerHTML = `<h2>イベント (${events.length})</h2>
          <table><thead><tr><th>ID</th><th>名前</th><th>作成</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table>
          <h3 style="margin-top:24px">新規作成</h3>
          <div class="row"><div><label>名前</label><input id="evName" placeholder="例: 土曜定例" /></div></div>
          <div style="margin-top:12px"><button class="btn" id="evCreate">作成</button></div>
          <p class="muted" style="margin-top:8px">※ 削除すると配下の通知・開催回・回答も連鎖削除されます。</p>`;

        $('#evCreate').onclick = async () => {
          const name = $('#evName').value.trim();
          if (!name) return toast('名前は必須です', true);
          try { await api('/events', { method: 'POST', body: JSON.stringify({ name }) });
            toast('作成しました'); loadEvents(); } catch (e) { toast(e.message, true); }
        };
        document.querySelectorAll('[data-esave]').forEach((b) => {
          b.onclick = async () => {
            const name = document.querySelector(`[data-ename="${b.dataset.esave}"]`).value.trim();
            if (!name) return toast('名前は必須です', true);
            try { await api('/events/' + b.dataset.esave, { method: 'PUT', body: JSON.stringify({ name }) });
              toast('保存しました'); } catch (e) { toast(e.message, true); }
          };
        });
        document.querySelectorAll('[data-edel]').forEach((b) => {
          b.onclick = async () => {
            if (!confirm('配下の通知ごと削除します。よろしいですか？')) return;
            try { await api('/events/' + b.dataset.edel, { method: 'DELETE' });
              toast('削除しました'); loadEvents(); } catch (e) { toast(e.message, true); }
          };
        });
      }

      // ================= 区分 =================
      async function loadSegments() {
        const segments = await api('/segments');
        cacheSegments = segments;
        const rows = segments
          .map(
            (s) => `<tr>
              <td class="muted">${s.id}</td>
              <td><input data-sname="${s.id}" value="${esc(s.name)}" /></td>
              <td><input data-srole="${s.id}" value="${esc(s.mention_role_id || '')}" placeholder="ロールID / @everyone" /></td>
              <td class="actions">
                <button class="btn sm" data-ssave="${s.id}">保存</button>
                <button class="btn sm secondary" data-smembers="${s.id}">メンバー</button>
                <button class="btn sm danger" data-sdel="${s.id}">削除</button>
              </td></tr>`,
          )
          .join('');
        $('#tab-segments').innerHTML = `<h2>区分 (${segments.length})</h2>
          <table><thead><tr><th>ID</th><th>名前</th><th>メンションロール</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table>
          <h3 style="margin-top:24px">新規作成</h3>
          <div class="row">
            <div><label>名前</label><input id="segName" placeholder="例: キャスト" /></div>
            <div><label>メンションロールID（任意 / @everyone 可）</label><input id="segRole" /></div>
          </div>
          <div style="margin-top:12px"><button class="btn" id="segCreate">作成</button></div>
          <p class="muted" style="margin-top:8px">※ 対象の通知が存在する区分は削除できません。</p>
          <section id="segMembersBox"></section>`;

        $('#segCreate').onclick = async () => {
          const name = $('#segName').value.trim();
          if (!name) return toast('名前は必須です', true);
          const mention_role_id = $('#segRole').value.trim() || null;
          try { await api('/segments', { method: 'POST', body: JSON.stringify({ name, mention_role_id }) });
            toast('作成しました'); loadSegments(); } catch (e) { toast(e.message, true); }
        };
        document.querySelectorAll('[data-ssave]').forEach((b) => {
          b.onclick = async () => {
            const id = b.dataset.ssave;
            const name = document.querySelector(`[data-sname="${id}"]`).value.trim();
            const mention_role_id = document.querySelector(`[data-srole="${id}"]`).value.trim() || null;
            if (!name) return toast('名前は必須です', true);
            try { await api('/segments/' + id, { method: 'PUT', body: JSON.stringify({ name, mention_role_id }) });
              toast('保存しました'); } catch (e) { toast(e.message, true); }
          };
        });
        document.querySelectorAll('[data-sdel]').forEach((b) => {
          b.onclick = async () => {
            if (!confirm('この区分を削除しますか？')) return;
            try { await api('/segments/' + b.dataset.sdel, { method: 'DELETE' });
              toast('削除しました'); loadSegments(); } catch (e) { toast(e.message, true); }
          };
        });
        document.querySelectorAll('[data-smembers]').forEach((b) => {
          b.onclick = () => loadSegmentMembers(Number(b.dataset.smembers));
        });
      }

      async function loadSegmentMembers(segmentId) {
        const seg = cacheSegments.find((s) => s.id === segmentId);
        const list = await api('/segments/' + segmentId + '/members');
        const rows = list
          .map((m) => {
            const paused = m.status === '休止中';
            const name = m.display_name || m.user_name || m.user_id;
            return `<tr>
              <td>${esc(name)}</td>
              <td class="muted">${esc(m.user_id)}</td>
              <td>${paused ? '<span class="pill off">休止中</span>' : '<span class="pill on">アクティブ</span>'}</td>
              <td class="actions">
                <button class="btn sm secondary" data-smtoggle="${esc(m.user_id)}" data-status="${paused ? '' : '休止中'}">${paused ? '再開' : '休止'}</button>
                <button class="btn sm danger" data-smdel="${esc(m.user_id)}">外す</button>
              </td></tr>`;
          })
          .join('');
        $('#segMembersBox').innerHTML = `<fieldset>
          <legend>区分メンバー: ${esc(seg ? seg.name : segmentId)} (${list.length})</legend>
          <table><thead><tr><th>表示名</th><th>User ID</th><th>状態</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table>
          <h3 style="margin-top:16px">メンバー追加</h3>
          <div class="row"><div><label>User ID</label><input id="smAddId" placeholder="Discord User ID" /></div></div>
          <div style="margin-top:12px"><button class="btn" id="smAdd">追加</button></div>
          </fieldset>`;

        $('#smAdd').onclick = async () => {
          const user_id = $('#smAddId').value.trim();
          if (!user_id) return toast('User ID は必須です', true);
          try { await api('/segments/' + segmentId + '/members', { method: 'POST', body: JSON.stringify({ user_id }) });
            toast('追加しました'); loadSegmentMembers(segmentId); } catch (e) { toast(e.message, true); }
        };
        document.querySelectorAll('[data-smtoggle]').forEach((b) => {
          b.onclick = async () => {
            try { await api('/segments/' + segmentId + '/members/' + encodeURIComponent(b.dataset.smtoggle),
                { method: 'PUT', body: JSON.stringify({ status: b.dataset.status }) });
              toast('更新しました'); loadSegmentMembers(segmentId); } catch (e) { toast(e.message, true); }
          };
        });
        document.querySelectorAll('[data-smdel]').forEach((b) => {
          b.onclick = async () => {
            if (!confirm('この区分から外しますか？')) return;
            try { await api('/segments/' + segmentId + '/members/' + encodeURIComponent(b.dataset.smdel),
                { method: 'DELETE' });
              toast('外しました'); loadSegmentMembers(segmentId); } catch (e) { toast(e.message, true); }
          };
        });
      }

      // ================= 通知 =================
      const WEEKDAYS = [['SU', '日'], ['MO', '月'], ['TU', '火'], ['WE', '水'], ['TH', '木'], ['FR', '金'], ['SA', '土']];

      // 繰り返しビルダ → rrule 文字列
      function buildRRule() {
        const mode = $('#nRecurMode').value;
        const byday = $('#nWeekday').value; // SU..SA
        if (mode === 'weekly') return `FREQ=WEEKLY;BYDAY=${byday}`;
        if (mode === 'biweekly') return `FREQ=WEEKLY;INTERVAL=2;BYDAY=${byday}`;
        if (mode === 'monthly') {
          const n = Number($('#nNth').value) || 1;
          return `FREQ=MONTHLY;BYDAY=${n}${byday}`;
        }
        return '';
      }

      // rrule 文字列 → ビルダ UI へ反映（解析できないものは weekly/SA 既定）
      function parseRRuleToBuilder(rrule) {
        const out = { mode: 'weekly', byday: 'SA', nth: 2 };
        if (!rrule) return out;
        const parts = Object.fromEntries(
          rrule.split(';').map((p) => { const [k, v] = p.split('='); return [k.toUpperCase(), v]; }),
        );
        const freq = (parts.FREQ || '').toUpperCase();
        const byday = (parts.BYDAY || '').toUpperCase();
        if (freq === 'MONTHLY') {
          const m = byday.match(/^(-?\d+)([A-Z]{2})$/);
          if (m) { out.mode = 'monthly'; out.nth = Number(m[1]); out.byday = m[2]; }
        } else if (freq === 'WEEKLY') {
          out.mode = parts.INTERVAL === '2' ? 'biweekly' : 'weekly';
          out.byday = byday.replace(/^-?\d+/, '') || 'SA';
        }
        return out;
      }

      async function loadNotifications() {
        const [notifications, events, segments] = await Promise.all([
          api('/notifications'), api('/events'), api('/segments'),
        ]);
        cacheEvents = events;
        cacheSegments = segments;
        const evName = (id) => { const e = events.find((x) => x.id === id); return e ? e.name : '?'; };
        const segName = (id) => { const s = segments.find((x) => x.id === id); return s ? s.name : '?'; };

        const rows = notifications
          .map((n) => {
            const sched = n.type === 'oneoff'
              ? `単発 ${esc(n.one_off_date || '')}`
              : `繰り返し <span class="muted">${esc(n.rrule || '')}</span>`;
            return `<tr>
              <td class="muted">${n.id}</td>
              <td>${esc(n.name)}</td>
              <td>${esc(evName(n.event_id))} / ${esc(segName(n.segment_id))}</td>
              <td>${sched}<br><span class="muted">${esc(n.start_time)} ch:${esc(n.channel_id)}</span></td>
              <td>${n.active ? '<span class="pill on">有効</span>' : '<span class="pill off">無効</span>'}</td>
              <td class="actions">
                <button class="btn sm" data-nedit="${n.id}">編集</button>
                <button class="btn sm danger" data-ndel="${n.id}">削除</button>
              </td></tr>`;
          })
          .join('');

        $('#tab-notifications').innerHTML = `<h2>通知 (${notifications.length})</h2>
          <table><thead><tr><th>ID</th><th>名前</th><th>イベント/区分</th><th>スケジュール</th><th>状態</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table>
          ${notifForm()}`;

        bindNotifForm();
        document.querySelectorAll('[data-nedit]').forEach((b) => {
          b.onclick = () => fillNotifForm(notifications.find((x) => x.id === Number(b.dataset.nedit)));
        });
        document.querySelectorAll('[data-ndel]').forEach((b) => {
          b.onclick = async () => {
            if (!confirm('配下の開催回・回答ごと削除します。よろしいですか？')) return;
            try { await api('/notifications/' + b.dataset.ndel, { method: 'DELETE' });
              toast('削除しました'); loadNotifications(); } catch (e) { toast(e.message, true); }
          };
        });
      }

      function notifForm() {
        const evOpts = cacheEvents.map((e) => `<option value="${e.id}">${esc(e.name)}</option>`).join('');
        const segOpts = cacheSegments.map((s) => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
        const wdOpts = WEEKDAYS.map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
        return `<h3 id="nFormTitle" style="margin-top:24px">新規作成</h3>
          <input type="hidden" id="nId" value="" />
          <div class="row">
            <div><label>名前</label><input id="nName" placeholder="例: 土曜定例の出欠" /></div>
            <div><label>チャンネルID</label><input id="nChannel" placeholder="投稿先チャンネルID" /></div>
          </div>
          <div class="row">
            <div><label>イベント</label><select id="nEvent">${evOpts}</select></div>
            <div><label>区分</label><select id="nSegment">${segOpts}</select></div>
          </div>
          <fieldset>
            <legend>スケジュール</legend>
            <label>種別</label>
            <select id="nType">
              <option value="recurring">繰り返し (recurring)</option>
              <option value="oneoff">単発 (oneoff)</option>
            </select>
            <div id="nRecurBox">
              <div class="row3">
                <div><label>繰り返し</label>
                  <select id="nRecurMode">
                    <option value="weekly">毎週</option>
                    <option value="biweekly">隔週</option>
                    <option value="monthly">毎月第N曜</option>
                  </select>
                </div>
                <div><label>曜日</label><select id="nWeekday">${wdOpts}</select></div>
                <div id="nNthBox"><label>第N</label>
                  <select id="nNth">
                    <option value="1">第1</option><option value="2">第2</option>
                    <option value="3">第3</option><option value="4">第4</option>
                    <option value="-1">最終</option>
                  </select>
                </div>
              </div>
              <label>生成される RRULE</label>
              <input id="nRrulePreview" readonly />
              <label>基準日（隔週のパリティ用・任意 YYYY/MM/DD）</label>
              <input id="nAnchor" placeholder="例: 2026/06/20（隔週の起点となる開催日）" />
            </div>
            <div id="nOneoffBox" class="hidden">
              <label>開催日 (YYYY/MM/DD)</label>
              <input id="nOneoffDate" placeholder="2026/06/20" />
            </div>
          </fieldset>
          <div class="row3">
            <div><label>開始時刻 (HH:MM)</label><input id="nStartTime" value="21:00" /></div>
            <div><label>募集（何日前）</label><input id="nRecruit" type="number" value="7" /></div>
            <div><label>未回答リマインド開始（日前）</label><input id="nRemindStart" type="number" value="3" /></div>
          </div>
          <div class="row3">
            <div><label>未定リマインド（日前）</label><input id="nRemindUndecided" type="number" value="1" /></div>
            <div><label>ノルマ間隔（日数）</label><input id="nQuotaInterval" type="number" placeholder="例: 30" /></div>
            <div></div>
          </div>
          <div class="actions" style="margin-top:12px">
            <label class="inline"><input type="checkbox" id="nQuota" /> ノルマ有効</label>
            <label class="inline"><input type="checkbox" id="nAssignment" /> 番号割り当て有効</label>
            <label class="inline"><input type="checkbox" id="nMention" checked /> メンション有効</label>
            <label class="inline"><input type="checkbox" id="nActive" checked /> 有効 (active)</label>
          </div>
          <div class="actions" style="margin-top:16px">
            <button class="btn" id="nSave">保存</button>
            <button class="btn secondary hidden" id="nReset">新規入力に戻す</button>
          </div>`;
      }

      function syncTypeUI() {
        const t = $('#nType').value;
        $('#nRecurBox').classList.toggle('hidden', t !== 'recurring');
        $('#nOneoffBox').classList.toggle('hidden', t !== 'oneoff');
        $('#nNthBox').classList.toggle('hidden', $('#nRecurMode').value !== 'monthly');
        if (t === 'recurring') $('#nRrulePreview').value = buildRRule();
      }

      function bindNotifForm() {
        ['nType', 'nRecurMode', 'nWeekday', 'nNth'].forEach((id) => {
          $('#' + id).onchange = syncTypeUI;
        });
        syncTypeUI();
        $('#nSave').onclick = saveNotif;
        $('#nReset').onclick = () => { resetNotifForm(); };
      }

      function resetNotifForm() {
        $('#nId').value = '';
        $('#nFormTitle').textContent = '新規作成';
        $('#nReset').classList.add('hidden');
        $('#nName').value = ''; $('#nChannel').value = '';
        $('#nType').value = 'recurring';
        $('#nRecurMode').value = 'weekly'; $('#nWeekday').value = 'SA'; $('#nNth').value = '2';
        $('#nOneoffDate').value = '';
        $('#nAnchor').value = '';
        $('#nStartTime').value = '21:00';
        $('#nRecruit').value = '7'; $('#nRemindStart').value = '3'; $('#nRemindUndecided').value = '1';
        $('#nQuotaInterval').value = '';
        $('#nQuota').checked = false; $('#nAssignment').checked = false;
        $('#nMention').checked = true; $('#nActive').checked = true;
        syncTypeUI();
      }

      function fillNotifForm(n) {
        if (!n) return;
        $('#nId').value = n.id;
        $('#nFormTitle').textContent = '編集 (ID: ' + n.id + ')';
        $('#nReset').classList.remove('hidden');
        $('#nName').value = n.name || '';
        $('#nChannel').value = n.channel_id || '';
        $('#nEvent').value = String(n.event_id);
        $('#nSegment').value = String(n.segment_id);
        $('#nType').value = n.type || 'recurring';
        const b = parseRRuleToBuilder(n.rrule);
        $('#nRecurMode').value = b.mode; $('#nWeekday').value = b.byday; $('#nNth').value = String(b.nth);
        $('#nOneoffDate').value = n.one_off_date || '';
        $('#nAnchor').value = n.anchor_date || '';
        $('#nStartTime').value = n.start_time || '21:00';
        $('#nRecruit').value = n.recruit_days_before;
        $('#nRemindStart').value = n.remind_start_days;
        $('#nRemindUndecided').value = n.remind_undecided_days;
        $('#nQuotaInterval').value = n.quota_interval_days == null ? '' : n.quota_interval_days;
        $('#nQuota').checked = !!n.quota_enabled;
        $('#nAssignment').checked = !!n.assignment_enabled;
        $('#nMention').checked = !!n.mention_enabled;
        $('#nActive').checked = !!n.active;
        syncTypeUI();
        $('#nFormTitle').scrollIntoView({ behavior: 'smooth' });
      }

      async function saveNotif() {
        const type = $('#nType').value;
        const qiRaw = $('#nQuotaInterval').value.trim();
        const body = {
          name: $('#nName').value.trim(),
          channel_id: $('#nChannel').value.trim(),
          event_id: Number($('#nEvent').value),
          segment_id: Number($('#nSegment').value),
          type,
          rrule: type === 'recurring' ? buildRRule() : null,
          one_off_date: type === 'oneoff' ? ($('#nOneoffDate').value.trim() || null) : null,
          anchor_date: type === 'recurring' ? ($('#nAnchor').value.trim() || null) : null,
          start_time: $('#nStartTime').value.trim(),
          recruit_days_before: Number($('#nRecruit').value),
          remind_start_days: Number($('#nRemindStart').value),
          remind_undecided_days: Number($('#nRemindUndecided').value),
          quota_enabled: $('#nQuota').checked ? 1 : 0,
          quota_interval_days: qiRaw === '' ? null : Number(qiRaw),
          assignment_enabled: $('#nAssignment').checked ? 1 : 0,
          mention_enabled: $('#nMention').checked ? 1 : 0,
          active: $('#nActive').checked ? 1 : 0,
        };
        if (!body.name) return toast('名前は必須です', true);
        if (!body.channel_id) return toast('チャンネルIDは必須です', true);
        if (!body.event_id) return toast('イベントを選択してください', true);
        if (!body.segment_id) return toast('区分を選択してください', true);
        if (type === 'oneoff' && !body.one_off_date) return toast('単発は開催日が必須です', true);
        const id = $('#nId').value;
        try {
          if (id) {
            await api('/notifications/' + id, { method: 'PUT', body: JSON.stringify(body) });
            toast('更新しました');
          } else {
            await api('/notifications', { method: 'POST', body: JSON.stringify(body) });
            toast('作成しました');
          }
          loadNotifications();
        } catch (e) { toast(e.message, true); }
      }

      // ================= メンバー =================
      async function loadMembers() {
        const members = await api('/members');
        const rows = members
          .map(
            (m) => `<tr>
              <td>${esc(m.display_name || m.user_name || '')}</td>
              <td class="muted">${esc(m.user_id)}</td>
              <td class="muted">${esc(m.user_name || '')}</td>
              <td class="muted">${esc((m.created_at || '').slice(0, 19))}</td>
              <td class="actions"><button class="btn sm danger" data-mdel="${esc(m.user_id)}">削除</button></td>
            </tr>`,
          )
          .join('');
        $('#tab-members').innerHTML = `<h2>メンバー (${members.length})</h2>
          <table><thead><tr><th>表示名</th><th>User ID</th><th>ユーザー名</th><th>作成</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table>
          <p class="muted" style="margin-top:8px">※ メンバーはボタン回答で自動登録されます。所属（区分）の管理は区分タブで行います。削除すると全区分・回答・割り当てから除去されます。</p>`;

        document.querySelectorAll('[data-mdel]').forEach((b) => {
          b.onclick = async () => {
            if (!confirm('このメンバーを完全に削除しますか？')) return;
            try { await api('/members/' + encodeURIComponent(b.dataset.mdel), { method: 'DELETE' });
              toast('削除しました'); loadMembers(); } catch (e) { toast(e.message, true); }
          };
        });
      }

      // ================= 記録 =================
      async function loadRecords() {
        const [responses, notifications] = await Promise.all([
          api('/responses?limit=200'), api('/notifications'),
        ]);
        cacheNotifications = notifications;
        const notifOpts = notifications
          .map((n) => `<option value="${n.id}">${esc(n.name)} (ID:${n.id})</option>`)
          .join('');

        const rrows = responses
          .map(
            (r) => `<tr>
              <td>${esc(r.occurrence_date || '')}</td>
              <td>${esc(r.notification_name || '')}</td>
              <td>${esc(r.user_name || r.user_id)}</td>
              <td>${esc(r.status)}</td>
              <td class="muted">${esc((r.updated_at || '').slice(0, 19))}</td>
            </tr>`,
          )
          .join('');

        $('#tab-records').innerHTML = `<h2>記録</h2>
          <fieldset>
            <legend>回答（直近 ${responses.length} 件）</legend>
            <table><thead><tr><th>開催日</th><th>通知</th><th>メンバー</th><th>回答</th><th>更新</th></tr></thead>
            <tbody>${rrows}</tbody></table>
          </fieldset>
          <fieldset>
            <legend>番号割り当て</legend>
            <div class="row">
              <div><label>通知</label><select id="recNotif"><option value="">選択してください</option>${notifOpts}</select></div>
              <div><label>開催回</label><select id="recOcc"><option value="">通知を選択</option></select></div>
            </div>
            <div class="actions" style="margin-top:12px">
              <button class="btn secondary" id="recLoadAssign">割り当て表示</button>
              <button class="btn" id="recRunAssign">番号割り当て実行</button>
            </div>
            <div id="recAssignBox" style="margin-top:12px"></div>
          </fieldset>`;

        $('#recNotif').onchange = async () => {
          const nid = $('#recNotif').value;
          $('#recAssignBox').innerHTML = '';
          if (!nid) { $('#recOcc').innerHTML = '<option value="">通知を選択</option>'; return; }
          try {
            const occs = await api('/notifications/' + nid + '/occurrences');
            $('#recOcc').innerHTML = '<option value="">選択してください</option>' +
              occs.map((o) => `<option value="${o.id}">${esc(o.occurrence_date)} [${esc(o.status)}] (ID:${o.id})</option>`).join('');
          } catch (e) { toast(e.message, true); }
        };
        $('#recLoadAssign').onclick = () => loadAssignments();
        $('#recRunAssign').onclick = runAssign;
      }

      let cacheNotifications = [];

      function renderAssignments(list) {
        if (!list || list.length === 0) {
          $('#recAssignBox').innerHTML = '<p class="muted">割り当てはまだありません。</p>';
          return;
        }
        const rows = list
          .map((a) => `<tr><td>#${a.number}</td><td>${esc(a.name || a.user_id)}</td><td class="muted">${esc(a.user_id)}</td></tr>`)
          .join('');
        $('#recAssignBox').innerHTML = `<table><thead><tr><th>番号</th><th>表示名</th><th>User ID</th></tr></thead>
          <tbody>${rows}</tbody></table>`;
      }

      async function loadAssignments() {
        const oid = $('#recOcc').value;
        if (!oid) return toast('開催回を選択してください', true);
        try {
          const list = await api('/occurrences/' + oid + '/assignments');
          renderAssignments(list);
        } catch (e) { toast(e.message, true); }
      }

      async function runAssign() {
        const oid = $('#recOcc').value;
        if (!oid) return toast('開催回を選択してください', true);
        if (!confirm('この開催回で番号割り当てを実行しますか？')) return;
        try {
          const res = await api('/occurrences/' + oid + '/assign', { method: 'POST' });
          const newly = (res && res.assigned ? res.assigned.length : 0);
          toast(`割り当て実行: 新規 ${newly} 名`);
          renderAssignments(res && res.all ? res.all : []);
        } catch (e) { toast(e.message, true); }
      }

      // ================= タブ切替 =================
      const TABS = ['events', 'notifications', 'segments', 'members', 'records'];
      const LOADERS = {
        events: loadEvents, notifications: loadNotifications, segments: loadSegments,
        members: loadMembers, records: loadRecords,
      };
      document.querySelectorAll('.tabs button').forEach((b) => {
        b.onclick = () => {
          document.querySelectorAll('.tabs button').forEach((x) => x.classList.remove('active'));
          b.classList.add('active');
          const tab = b.dataset.tab;
          TABS.forEach((t) => $('#tab-' + t).classList.toggle('hidden', t !== tab));
          LOADERS[tab]();
        };
      });

      $('#tokenSave').onclick = () => {
        token = $('#tokenInput').value.trim();
        localStorage.setItem(TOKEN_KEY, token);
        showApp();
      };
      $('#logout').onclick = () => {
        localStorage.removeItem(TOKEN_KEY);
        token = '';
        showGate();
      };

      // 初期表示
      if (token) showApp();
      else showGate();
    </script>
  </body>
</html>
