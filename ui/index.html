<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EventBot 管理</title>
    <style>
      /* ===== design-system/styles/tokens.css ===== */
      /* =============================================================
       * EventBot Design System — Design Tokens（単一の真実 / source of truth）
       * Discord 2025 Q1 リフレッシュ準拠のモダンダークテーマ。
       * ============================================================= */
      :root {
        /* --- 背景・面 (surfaces) --- */
        --bg: #111214;
        --panel: #1e1f22;
        --panel2: #2b2d31;
        --elevated: #313338;
      
        /* --- 境界線 (borders) --- */
        --border: #3f4147;
        --border2: #484b52;
        --border-hover: #4e5058;
      
        /* --- テキスト --- */
        --text: #dbdee1;
        --muted: #b5bac1;
        --text-placeholder: #87898c;
      
        /* --- アクセント (Discord blurple 系) --- */
        --accent: #5865f2;
        --accent-hover: #4752c4;
        --accent-soft: rgba(88, 101, 242, .15);
      
        /* --- 状態色 (semantic) --- */
        --danger: #f23f43;
        --danger-hover: #da373c;
        --ok: #23a559;
        --warn: #f0b232;
      
        /* --- ボタン hover (darken パターン) --- */
        --btn-secondary-hover: #3a3c41;
        --btn-danger-hover: #a12d31;
      
        /* --- コンポーネント固有テキスト --- */
        --pill-ok-text: #2dc770;
        --nav-active-text: #f2f3f5;
        --avatar-text: #c9cdfb;
      
        /* --- オーバーレイ --- */
        --backdrop: rgba(0, 0, 0, .7);
      
        /* --- フォーカスリング --- */
        --ring: 0 0 0 2px rgba(88, 101, 242, .4);
      
        /* --- 角丸・影・余白 --- */
        --r: 8px;
        --r-sm: 4px;
        --r-lg: 12px;
        --shadow: 0 8px 16px rgba(0, 0, 0, .24);
        --sp: 12px;
      }

      /* ===== design-system/styles/components.css ===== */
      /* =============================================================
       * EventBot Design System — Base & Components
       * 構造は ui/index.html のインライン <style> 由来。色・角丸は
       * tokens.css（Discord 2025 ダーク）の var(--*) に全面配線。
       * index.css 経由で読み込む。
       * ============================================================= */
      
      /* ---------- Reset / Base ---------- */
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        font-size: 14px; line-height: 1.55; -webkit-font-smoothing: antialiased;
      }
      h1 { font-size: 19px; }
      h2 { font-size: 17px; margin: 0 0 4px; }
      h3 { font-size: 15px; margin: 0 0 8px; }
      a { color: var(--accent); }
      code { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px; font-size: 12.5px; }
      
      /* ---------- Form controls ---------- */
      label { display: block; color: var(--muted); margin: 12px 0 5px; font-size: 12.5px; font-weight: 600; letter-spacing: .01em; }
      input, select, textarea {
        width: 100%; padding: 9px 11px; background: var(--bg);
        border: 1px solid var(--border2); border-radius: var(--r-sm); color: var(--text);
        color-scheme: dark; /* ネイティブの日付/時刻ピッカーのアイコン・カレンダーを暗背景向けに明色化 */
        font-family: inherit; font-size: 14px; transition: border-color .17s ease, box-shadow .17s ease, background .17s ease;
      }
      input:hover, select:hover, textarea:hover { border-color: var(--border-hover); }
      input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: var(--ring); }
      input.invalid, select.invalid, textarea.invalid { border-color: var(--danger); box-shadow: 0 0 0 2px color-mix(in srgb, var(--danger) 40%, transparent); }
      ::placeholder { color: var(--text-placeholder); }
      .field-error { color: var(--danger); font-size: 12px; margin-top: 4px; min-height: 0; }
      label.inline { display: inline-flex; align-items: center; gap: 8px; margin: 8px 14px 0 0; color: var(--text); font-weight: 500; cursor: pointer; }
      label.inline input { width: auto; accent-color: var(--accent); }
      
      /* ---------- Buttons ---------- */
      button.btn {
        background: var(--accent); color: #fff; border: 1px solid transparent;
        padding: 9px 16px; border-radius: var(--r-sm); cursor: pointer; font-size: 14px; font-weight: 600;
        font-family: inherit; line-height: 1.2; transition: background .17s ease, border-color .17s ease, transform .04s, opacity .17s ease;
        display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
      }
      button.btn:hover { background: var(--accent-hover); }
      button.btn:active { transform: translateY(1px); }
      button.btn:focus-visible { outline: none; box-shadow: var(--ring); }
      button.btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
      button.btn.secondary { background: var(--elevated); color: var(--text); border-color: var(--border2); }
      button.btn.secondary:hover { background: var(--btn-secondary-hover); }
      button.btn.danger { background: var(--danger); }
      button.btn.danger:hover { background: var(--btn-danger-hover); }
      button.btn.ghost { background: none; border: 1px solid var(--border2); color: var(--muted); }
      button.btn.ghost:hover { background: var(--elevated); color: var(--text); }
      button.btn.sm { padding: 5px 11px; font-size: 13px; }
      button.btn.xs { padding: 3px 8px; font-size: 12px; border-radius: 6px; }
      button.btn.busy { position: relative; color: transparent !important; pointer-events: none; }
      button.btn.busy::after {
        content: ""; position: absolute; inset: 0; margin: auto; width: 14px; height: 14px;
        border: 2px solid rgba(255, 255, 255, .5); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      /* ---------- Table ---------- */
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
      th { color: var(--muted); font-weight: 600; font-size: 12.5px; }
      tbody tr:hover { background: rgba(255, 255, 255, .04); }
      .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--r-sm); }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp); }
      .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--sp); }
      
      /* ---------- Feedback: toast / pill / summary / empty ---------- */
      .toast {
        position: fixed; bottom: 20px; right: 20px; padding: 12px 16px; border-radius: var(--r-sm);
        background: var(--ok); color: #fff; opacity: 0; transform: translateY(8px);
        transition: opacity .2s, transform .2s; pointer-events: none; max-width: min(60vw, 420px); z-index: 60; box-shadow: var(--shadow); font-weight: 500;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast.err { background: var(--danger); }
      .pill { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px; border: 1px solid var(--border2); color: var(--muted); }
      .pill.on { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--pill-ok-text); border-color: color-mix(in srgb, var(--ok) 40%, transparent); }
      .pill.off { color: var(--muted); }
      .summary {
        display: flex; align-items: center; gap: 8px; padding: 11px 13px; margin: 14px 0;
        background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: var(--r-sm); font-size: 14px; font-weight: 500;
      }
      .empty {
        text-align: center; color: var(--muted); padding: 28px 16px; border: 1px dashed var(--border2);
        border-radius: var(--r); background: var(--panel);
      }
      
      /* ---------- Settings patterns (Discord 設定画面風) ---------- */
      /* Switch (トグル) */
      .switch { position: relative; display: inline-flex; flex: none; width: 40px; height: 24px; cursor: pointer; }
      .switch input { position: absolute; inset: 0; opacity: 0; margin: 0; cursor: pointer; }
      .switch-slider { position: absolute; inset: 0; background: var(--border2); border-radius: 999px; transition: background .15s ease; }
      .switch-slider::before { content: ""; position: absolute; top: 4px; left: 4px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .15s ease; }
      .switch input:checked + .switch-slider { background: var(--accent); }
      .switch input:checked + .switch-slider::before { transform: translateX(16px); }
      .switch input:focus-visible + .switch-slider { box-shadow: var(--ring); }
      .switch input:disabled + .switch-slider { opacity: .5; cursor: not-allowed; }
      
      /* Radio (タイトル＋説明つき) */
      .radio-group { display: flex; flex-direction: column; gap: 2px; }
      .radio-option { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; cursor: pointer; }
      .radio-option > input { position: absolute; opacity: 0; width: 0; height: 0; }
      .radio-mark { flex: none; width: 20px; height: 20px; margin-top: 1px; border-radius: 50%; border: 2px solid var(--border-hover); position: relative; transition: border-color .15s ease; }
      .radio-option > input:checked + .radio-mark { border-color: var(--accent); }
      .radio-option > input:checked + .radio-mark::after { content: ""; position: absolute; inset: 4px; border-radius: 50%; background: var(--accent); }
      .radio-option > input:focus-visible + .radio-mark { box-shadow: var(--ring); }
      .radio-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .radio-title { color: var(--text); font-weight: 600; font-size: 14px; }
      .radio-desc { color: var(--muted); font-size: 12.5px; }
      
      /* SettingRow (ラベル＋説明 / 右にコントロール) */
      .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
      .setting-row:last-child { border-bottom: none; }
      .setting-row-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .setting-row-title { color: var(--text); font-weight: 600; font-size: 14px; }
      .setting-row-desc { color: var(--muted); font-size: 12.5px; }
      .setting-row-control { flex: none; display: flex; align-items: center; gap: 8px; }
      
      /* NavRow (アイコン＋タイトル＋説明＋シェブロンの遷移行) */
      .nav-row { display: flex; align-items: center; gap: 12px; padding: 13px 8px; cursor: pointer; border-radius: var(--r-sm); transition: background .12s ease; }
      .nav-row:hover { background: var(--panel2); }
      .nav-row:focus-visible { outline: none; box-shadow: var(--ring); }
      .nav-row-icon { flex: none; display: flex; color: var(--muted); }
      .nav-row-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
      .nav-row-title { color: var(--text); font-weight: 600; font-size: 14px; }
      .nav-row-desc { color: var(--muted); font-size: 12.5px; }
      .nav-row-chevron { flex: none; color: var(--muted); font-size: 18px; line-height: 1; }
      
      /* Divider (汎用の区切り線) */
      .divider { height: 1px; border: none; background: var(--border); margin: 16px 0; }
      
      /* Alert (情報/警告/危険のコールアウト) */
      .alert { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; border-radius: var(--r-sm); font-size: 13.5px; color: var(--text); border: 1px solid var(--accent); background: color-mix(in srgb, var(--accent) 9%, transparent); }
      .alert-icon { flex: none; display: flex; color: var(--accent); margin-top: 1px; }
      .alert.warn { border-color: var(--warn); background: color-mix(in srgb, var(--warn) 9%, transparent); }
      .alert.warn .alert-icon { color: var(--warn); }
      .alert.danger { border-color: var(--danger); background: color-mix(in srgb, var(--danger) 9%, transparent); }
      .alert.danger .alert-icon { color: var(--danger); }
      .alert.ok { border-color: var(--ok); background: color-mix(in srgb, var(--ok) 9%, transparent); }
      .alert.ok .alert-icon { color: var(--ok); }
      
      /* SubTabs (設定ページ内の縦サブタブ・active は左に accent バー) */
      .subtabs { display: flex; flex-direction: column; gap: 2px; }
      .subtab {
        position: relative; display: flex; align-items: center; gap: 8px; width: 100%;
        padding: 8px 12px; border: none; border-radius: var(--r-sm); background: none;
        color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 600; text-align: left;
        cursor: pointer; user-select: none; transition: background .12s ease, color .12s ease;
      }
      .subtab:hover { background: var(--panel2); color: var(--text); }
      .subtab.active { background: var(--panel2); color: var(--nav-active-text); }
      .subtab.active::before {
        content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
        width: 3px; height: 20px; border-radius: 0 3px 3px 0; background: var(--accent);
      }
      .subtab:focus-visible { outline: none; box-shadow: var(--ring); }
      
      /* DropdownButton (アイコン＋値＋キャレットの選択トリガ。native select の見た目寄せ版) */
      .dropdown-btn {
        display: inline-flex; align-items: center; gap: 8px; padding: 7px 11px;
        background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: var(--r-sm);
        font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
        transition: border-color .15s ease, background .15s ease;
      }
      .dropdown-btn:hover { border-color: var(--border-hover); }
      .dropdown-btn:focus-visible { outline: none; border-color: var(--accent); box-shadow: var(--ring); }
      .dropdown-btn-icon { flex: none; display: flex; color: var(--muted); }
      .dropdown-btn-label { flex: 1; text-align: left; white-space: nowrap; }
      .dropdown-btn-caret { flex: none; color: var(--muted); font-size: 14px; line-height: 1; transition: transform .15s ease; }
      .dropdown-btn[aria-expanded="true"] .dropdown-btn-caret { transform: rotate(180deg); }
      
      /* ---------- Utilities ---------- */
      .hidden { display: none !important; }
      .muted { color: var(--muted); }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      
      /* ---------- Containers: fieldset ---------- */
      fieldset { border: 1px solid var(--border); border-radius: var(--r); margin: 14px 0; padding: 14px 16px; background: var(--panel); }
      legend { color: var(--text); padding: 0 8px; font-weight: 600; }
      
      /* ---------- App shell: topbar / sidebar / main / cards ---------- */
      .shell { display: grid; grid-template-columns: 210px 1fr; min-height: calc(100vh - 57px); }
      .side { border-right: 1px solid var(--border); padding: 14px 10px; background: var(--panel); }
      .side .navitem {
        display: flex; align-items: center; gap: 9px; padding: 10px 12px; border-radius: var(--r-sm);
        color: var(--muted); cursor: pointer; margin-bottom: 3px; font-weight: 600; user-select: none;
        border: 1px solid transparent; transition: background .17s ease, color .17s ease;
      }
      .side .navitem:hover { background: var(--elevated); color: var(--text); }
      .side .navitem.active { background: var(--accent-soft); color: var(--nav-active-text); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
      .topbar {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 11px 18px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 20;
      }
      .srv { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .ava {
        width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; flex: none;
        justify-content: center; font-weight: 700; background: var(--accent-soft); color: var(--avatar-text); overflow: hidden;
      }
      .ava img { width: 100%; height: 100%; object-fit: cover; display: block; }
      main { padding: 22px; max-width: 940px; }
      .card {
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--r);
        padding: 15px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .17s ease, background .17s ease, transform .04s;
      }
      .card:hover { border-color: var(--border2); background: var(--panel2); }
      .card:active { transform: translateY(1px); }
      .listrow {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 13px 14px; border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 8px; background: var(--panel);
      }
      .listrow:hover { border-color: var(--border2); }
      .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
      .search { position: relative; }
      .pickrow {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 6px; background: var(--panel2);
      }
      
      /* ---------- Server rail (Discord 風・最左のサーバー切替列) ---------- */
      .server-rail {
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        flex: none; width: 72px; padding: 12px 0; background: var(--bg); overflow-y: auto;
      }
      .server-rail-item {
        position: relative; flex: none; width: 48px; height: 48px; padding: 0; border: none; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        border-radius: 24px; background: var(--elevated); color: var(--text);
        font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; user-select: none;
        transition: border-radius .15s ease, background .15s ease, color .15s ease;
      }
      .server-rail-item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      /* 左端の白インジケータ（hover で伸び、active で最大） */
      .server-rail-item::before {
        content: ""; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
        width: 4px; height: 0; border-radius: 0 4px 4px 0; background: var(--nav-active-text); transition: height .15s ease;
      }
      .server-rail-item:hover { border-radius: 16px; background: var(--accent); color: #fff; }
      .server-rail-item:hover::before { height: 20px; }
      .server-rail-item.active { border-radius: 16px; background: var(--accent); color: #fff; }
      .server-rail-item.active::before { height: 40px; }
      .server-rail-item.add { color: var(--ok); }
      .server-rail-item.add:hover { background: var(--ok); color: #fff; }
      .server-rail-item:focus-visible { outline: none; box-shadow: var(--ring); }
      .server-rail-divider { flex: none; width: 32px; height: 2px; border-radius: 1px; background: var(--border2); margin: 2px 0; }
      
      /* ---------- App-specific: 単発候補スロット (one-off slots) ---------- */
      .slotgroup { border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 12px; margin-bottom: 10px; background: var(--panel2); }
      .slotgroup-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .slotgroup-head .slotDate { max-width: 220px; flex: 1 1 160px; }
      .timechips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
      .timechip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg); border: 1px solid var(--border2); border-radius: 999px; padding: 3px 6px 3px 10px; }
      .timechip input[type=time] { width: auto; border: none; background: none; padding: 2px 0; }
      .timechip input[type=time]:focus { box-shadow: none; }
      
      /* ---------- Modal / dialog ---------- */
      .backdrop {
        position: fixed; inset: 0; background: var(--backdrop); display: flex; align-items: center;
        justify-content: center; z-index: 80; padding: 20px; animation: fade .15s ease;
      }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
      .modal { background: var(--elevated); border: 1px solid var(--border2); border-radius: var(--r-lg); box-shadow: var(--shadow); max-width: 420px; width: 100%; padding: 20px; }
      .modal h3 { margin: 0 0 8px; }
      .modal p { margin: 0 0 16px; color: var(--text); }
      .modal .actions { justify-content: flex-end; }
      
      /* ---------- Responsive ---------- */
      @media (max-width: 720px) {
        .shell { grid-template-columns: 1fr; min-height: 0; }
        .side { border-right: none; border-bottom: 1px solid var(--border); display: flex; gap: 6px; overflow-x: auto; padding: 10px; }
        .side .navitem { margin: 0; white-space: nowrap; }
        main { padding: 16px; }
      }
      @media (max-width: 640px) {
        .row, .row3 { grid-template-columns: 1fr; }
        .listrow { flex-direction: column; align-items: stretch; }
        .listrow .actions { justify-content: flex-start; }
        .toast { left: 16px; right: 16px; max-width: none; }
      }

      /* ===== design-system/styles/app-ui.css ===== */
      /* =============================================================
       * EventBot — App composition layer（管理UI ui/index.html 専用）
       * design-system の純コンポーネント（components.css）を、管理画面の
       * 「画面」へ組み立てるレイアウト糊。tokens / components とは別レイヤーで、
       * React 層・preview には不要なため index.css には含めない。
       * sync-ui.mjs が tokens.css + components.css と連結して
       * ui/index.html の <style> に注入する。
       * ============================================================= */
      
      /* ---- ワークスペース全体: 最左の server-rail ＋ 本体（topbar + shell） ---- */
      .ws-layout { display: flex; align-items: stretch; min-height: 100vh; }
      .ws-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      
      /* server-rail は左に固定（本体をスクロールしても残す） */
      .ws-layout > .server-rail {
        position: sticky; top: 0; align-self: flex-start; height: 100vh;
        border-right: 1px solid var(--border);
      }
      
      /* ---- 狭幅: rail を上部の横スクロール帯へ ---- */
      @media (max-width: 720px) {
        .ws-layout { flex-direction: column; }
        .ws-layout > .server-rail {
          position: static; height: auto; width: 100%;
          flex-direction: row; overflow-x: auto; overflow-y: visible;
          padding: 8px 10px; border-right: none; border-bottom: 1px solid var(--border);
        }
        .ws-layout > .server-rail .server-rail-item::before { display: none; }
        .ws-layout > .server-rail .server-rail-divider { width: 2px; height: 32px; margin: 0 2px; }
      }
    </style>
  </head>
  <body>
    <!-- トークンゲート -->
    <div id="gate" class="hidden" style="max-width: 420px; margin: 80px auto;">
      <div class="card" style="cursor:default">
        <h1>管理トークン</h1>
        <p class="muted">ADMIN_TOKEN を入力してください。</p>
        <input id="tokenInput" type="password" placeholder="ADMIN_TOKEN" />
        <div style="margin-top: 12px;"><button class="btn" id="tokenSave">ログイン</button></div>
      </div>
    </div>

    <!-- サーバー選択（最上位スコープ） -->
    <div id="picker" class="hidden">
      <div class="topbar">
        <h1 style="margin:0">🗓 EventBot 管理</h1>
        <button class="btn secondary" id="pickerLogout">ログアウト</button>
      </div>
      <main style="max-width:760px; margin:0 auto;">
        <h2>管理するサーバーを選択</h2>
        <p class="muted">Bot が参加しているサーバーから選びます（Discord から自動取得）。</p>
        <div id="guildCards" class="grid-cards"></div>
      </main>
    </div>

    <!-- ワークスペース -->
    <div id="workspace" class="hidden">
      <div class="ws-layout">
      <nav class="server-rail" id="serverRail" aria-label="サーバー一覧"></nav>
      <div class="ws-body">
      <div class="topbar">
        <div class="srv">
          <div class="ava" id="wsAva">?</div>
          <div><div id="wsName" style="font-weight:600">—</div><div class="muted" style="font-size:11px">サーバー</div></div>
        </div>
        <div class="actions">
          <button class="btn secondary" id="logout">ログアウト</button>
        </div>
      </div>
      <div class="shell">
        <nav class="side">
          <div class="navitem active" data-sec="notifications">🔔 通知</div>
          <div class="navitem" data-sec="segments">👥 メンバー区分</div>
          <div class="navitem" data-sec="records">🗒 回答履歴</div>
          <div class="navitem" data-sec="setup">⚙️ セットアップ</div>
        </nav>
        <main>
          <section id="sec-notifications"></section>
          <section id="sec-segments" class="hidden"></section>
          <section id="sec-records" class="hidden"></section>
          <section id="sec-setup" class="hidden"></section>
        </main>
      </div>
      </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const TOKEN_KEY = 'eventbot_admin_token';
      const GUILD_KEY = 'eventbot_guild';
      let token = localStorage.getItem(TOKEN_KEY) || '';
      let guild = null; // { id, name, icon }

      const $ = (s) => document.querySelector(s);
      function esc(v) {
        return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
      let toastTimer = null;
      function toast(msg, err) {
        const t = $('#toast');
        t.textContent = msg;
        t.className = 'toast show' + (err ? ' err' : '');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => (t.className = 'toast'), 2800);
      }
      async function api(path, opts = {}) {
        const res = await fetch('/api/admin' + path, {
          ...opts,
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, ...(opts.headers || {}) },
        });
        if (res.status === 401) { showGate(); throw new Error('認証に失敗しました'); }
        if (!res.ok) {
          let detail = res.status;
          try { const b = await res.json(); if (b && b.error) detail = res.status + ' ' + b.error; } catch (_) {}
          throw new Error('エラー: ' + detail);
        }
        return res.status === 204 ? null : res.json();
      }

      // ----- 共通UI: 確認モーダル / ボタンのbusy状態 -----
      function confirmDialog(message, opts = {}) {
        return new Promise((resolve) => {
          // ネイティブ <dialog>。top-layer なので、開催回/メンバー等のフォームモーダル上でも背後に隠れない。
          const d = document.createElement('dialog');
          d.className = 'modal';
          d.setAttribute('aria-label', '確認');
          d.innerHTML = `<h3>${esc(opts.title || '確認')}</h3>
            <p>${esc(message)}</p>
            <div class="actions">
              <button class="btn ghost" data-cancel>キャンセル</button>
              <button class="btn ${opts.danger ? 'danger' : ''}" data-ok>${esc(opts.okLabel || 'OK')}</button>
            </div>`;
          document.body.appendChild(d);
          const close = (val) => { d.close(); d.remove(); resolve(val); };
          d.querySelector('[data-cancel]').onclick = () => close(false);
          d.querySelector('[data-ok]').onclick = () => close(true);
          d.addEventListener('cancel', (e) => { e.preventDefault(); close(false); }); // Esc=キャンセル
          d.addEventListener('click', (e) => { if (e.target === d) close(false); }); // 背景クリック=キャンセル
          d.showModal();
          d.querySelector('[data-ok]').focus();
        });
      }
      async function withBusy(btn, fn) {
        if (!btn) return fn();
        const wasDisabled = btn.disabled;
        btn.classList.add('busy'); btn.disabled = true;
        try { return await fn(); }
        finally { btn.classList.remove('busy'); btn.disabled = wasDisabled; }
      }

      // ================= 画面遷移 =================
      function showGate() {
        $('#gate').classList.remove('hidden');
        $('#picker').classList.add('hidden');
        $('#workspace').classList.add('hidden');
      }
      async function showPicker() {
        $('#gate').classList.add('hidden');
        $('#workspace').classList.add('hidden');
        $('#picker').classList.remove('hidden');
        await loadGuilds();
      }
      function showWorkspace() {
        cacheGuildMembers = null; // サーバー跨ぎでピッカーに前サーバーの在籍が残らないようリセット
        $('#gate').classList.add('hidden');
        $('#picker').classList.add('hidden');
        $('#workspace').classList.remove('hidden');
        $('#wsName').textContent = guild.name;
        $('#wsAva').textContent = (guild.name || '?').slice(0, 1);
        renderServerRail(); // 最左サーバー列を描画（非同期・ベストエフォート）
        switchSection('notifications');
      }

      // ================= サーバー選択 =================
      let cacheGuilds = null;
      async function fetchGuilds() {
        if (cacheGuilds) return cacheGuilds;
        cacheGuilds = await api('/guilds');
        return cacheGuilds;
      }
      async function loadGuilds() {
        let guilds = [];
        try { guilds = await fetchGuilds(); } catch (e) { toast(e.message, true); }
        $('#guildCards').innerHTML = guilds.length
          ? guilds.map((g) => {
              const u = guildIconUrl(g);
              const ava = u ? `<img src="${esc(u)}" alt="" loading="lazy" onerror="this.remove()">` : esc((g.name || '?').slice(0, 1));
              return `<div class="card" data-gid="${esc(g.id)}" data-gname="${esc(g.name)}">
              <div class="srv"><div class="ava">${ava}</div>
              <div><div style="font-weight:600">${esc(g.name)}</div>
              <div class="muted" style="font-size:12px">ID: ${esc(g.id)}</div></div></div></div>`;
            }).join('')
          : '<p class="muted">参加サーバーが取得できませんでした。bot トークン / 権限を確認してください。</p>';
        document.querySelectorAll('#guildCards .card').forEach((c) => {
          c.onclick = () => selectGuild({ id: c.dataset.gid, name: c.dataset.gname });
        });
      }
      // サーバーアイコンの CDN URL（icon ハッシュがあれば。無ければ null → 頭文字フォールバック）
      function guildIconUrl(g) {
        return g && g.icon ? 'https://cdn.discordapp.com/icons/' + g.id + '/' + g.icon + '.png?size=96' : null;
      }
      // Discord 風の最左サーバー列。workspace で現在サーバーを強調しつつ、クリックで切替。
      async function renderServerRail() {
        const rail = $('#serverRail');
        if (!rail) return;
        let guilds = [];
        try { guilds = await fetchGuilds(); } catch (_) { return; } // rail はベストエフォート
        const cur = guild && guild.id;
        rail.innerHTML = guilds.map((g) => {
          const on = g.id === cur;
          const u = guildIconUrl(g);
          const letter = esc((g.name || '?').slice(0, 1));
          const img = u ? `<img src="${esc(u)}" alt="" loading="lazy" onerror="this.remove()">` : '';
          return `<button class="server-rail-item${on ? ' active' : ''}" data-gid="${esc(g.id)}" data-gname="${esc(g.name)}" title="${esc(g.name)}" aria-label="${esc(g.name)}"${on ? ' aria-current="true"' : ''}>${letter}${img}</button>`;
        }).join('');
        // 現在サーバーのアイコンを上部バーのアバターにも反映（あれば。無ければ頭文字のまま）
        const curUrl = guildIconUrl(guilds.find((g) => g.id === cur));
        if (curUrl) $('#wsAva').innerHTML = `<img src="${esc(curUrl)}" alt="" loading="lazy" onerror="this.remove()">`;
        rail.querySelectorAll('.server-rail-item').forEach((b) => {
          b.onclick = () => {
            if (b.dataset.gid === (guild && guild.id)) return;
            selectGuild({ id: b.dataset.gid, name: b.dataset.gname });
          };
        });
      }
      function selectGuild(g) {
        guild = g;
        localStorage.setItem(GUILD_KEY, JSON.stringify(g));
        location.hash = g.id;
        showWorkspace();
      }

      // ================= ナビ =================
      const SECTIONS = ['notifications', 'segments', 'records', 'setup'];
      const LOADERS = { notifications: loadNotifications, segments: loadSegments, records: loadRecords, setup: loadSetup };
      function switchSection(sec) {
        document.querySelectorAll('.side .navitem').forEach((x) => x.classList.toggle('active', x.dataset.sec === sec));
        SECTIONS.forEach((s) => $('#sec-' + s).classList.toggle('hidden', s !== sec));
        LOADERS[sec]();
      }
      document.querySelectorAll('.side .navitem').forEach((n) => { n.onclick = () => switchSection(n.dataset.sec); });

      // ================= 繰り返し（RRULE は隠す） =================
      const WEEKDAYS = [['SU', '日'], ['MO', '月'], ['TU', '火'], ['WE', '水'], ['TH', '木'], ['FR', '金'], ['SA', '土']];
      const NTH = [['1', '第1'], ['2', '第2'], ['3', '第3'], ['4', '第4'], ['5', '第5'], ['-1', '最終']];
      const wdLabel = (c) => (WEEKDAYS.find((w) => w[0] === c) || ['', ''])[1];
      const nthLabel = (n) => (NTH.find((x) => x[0] === String(n)) || ['', ''])[1];

      function buildRRule() {
        const mode = $('#nMode').value, byday = $('#nWeekday').value;
        if (mode === 'weekly') return `FREQ=WEEKLY;BYDAY=${byday}`;
        if (mode === 'biweekly') return `FREQ=WEEKLY;INTERVAL=2;BYDAY=${byday}`;
        if (mode === 'monthly') {
          const rules = getMonthlyRules();
          return rules.length ? `FREQ=MONTHLY;BYDAY=${rules.map((r) => r.nth + r.byday).join(',')}` : '';
        }
        return '';
      }
      function parseRRuleToBuilder(rrule) {
        const out = { mode: 'weekly', byday: 'SA', nth: '2', rules: [] };
        if (!rrule) return out;
        const p = Object.fromEntries(rrule.split(';').map((x) => { const [k, v] = x.split('='); return [k.toUpperCase(), v]; }));
        const freq = (p.FREQ || '').toUpperCase(), byday = (p.BYDAY || '').toUpperCase();
        if (freq === 'MONTHLY') {
          out.mode = 'monthly';
          out.rules = byday.split(',').map((tok) => {
            const m = tok.match(/^(-?\d+)([A-Z]{2})$/);
            return m ? { nth: m[1], byday: m[2] } : null;
          }).filter(Boolean);
          if (out.rules.length) { out.nth = out.rules[0].nth; out.byday = out.rules[0].byday; }
        } else if (freq === 'WEEKLY') {
          out.mode = p.INTERVAL === '2' ? 'biweekly' : 'weekly';
          out.byday = byday.replace(/^-?\d+/, '') || 'SA';
        }
        return out;
      }
      // ----- 毎月: (第N, 曜日) ルールの複数指定 -----
      function monthlyRuleHtml(nth, byday) {
        const nthOpts = NTH.map(([v, l]) => `<option value="${v}"${v === String(nth) ? ' selected' : ''}>${l}</option>`).join('');
        const wdOpts = WEEKDAYS.map(([v, l]) => `<option value="${v}"${v === byday ? ' selected' : ''}>${l}曜</option>`).join('');
        return `<span data-mrule style="display:inline-flex;align-items:center;gap:6px">
          <select class="mNth" style="width:auto" aria-label="第N">${nthOpts}</select>
          <select class="mWd" style="width:auto" aria-label="曜日">${wdOpts}</select>
          <button type="button" class="btn xs ghost" data-rmmrule aria-label="このルールを削除">×</button>
        </span>`;
      }
      function bindMonthlyControls() {
        const box = $('#nMonthlyRules'); if (!box) return;
        box.querySelectorAll('.mNth, .mWd').forEach((s) => { s.onchange = syncNotifUI; });
        box.querySelectorAll('[data-rmmrule]').forEach((b) => {
          b.onclick = () => {
            if (box.querySelectorAll('[data-mrule]').length > 1) { b.closest('[data-mrule]').remove(); syncNotifUI(); }
            else toast('ルールは最低1つ必要です', true);
          };
        });
      }
      function renderMonthlyRules(rules) {
        const box = $('#nMonthlyRules'); if (!box) return;
        const list = (rules && rules.length) ? rules : [{ nth: '2', byday: 'SA' }];
        box.innerHTML = list.map((r) => monthlyRuleHtml(r.nth, r.byday)).join('');
        bindMonthlyControls();
      }
      function addMonthlyRule() {
        const box = $('#nMonthlyRules'); if (!box) return;
        box.insertAdjacentHTML('beforeend', monthlyRuleHtml('1', 'SU'));
        bindMonthlyControls(); syncNotifUI();
      }
      /** (第N, 曜日) ルールを取得し重複除去（順序維持）。 */
      function getMonthlyRules() {
        const box = $('#nMonthlyRules'); if (!box) return [];
        const seen = new Set(), out = [];
        box.querySelectorAll('[data-mrule]').forEach((r) => {
          const nth = r.querySelector('.mNth').value, byday = r.querySelector('.mWd').value;
          const k = nth + byday;
          if (!seen.has(k)) { seen.add(k); out.push({ nth, byday }); }
        });
        return out;
      }
      /** 「毎月 第1・第3・第5 日曜日」/ 混在「毎月 第1日曜・第3火曜」 */
      function humanMonthly(rules) {
        if (!rules || !rules.length) return '毎月（未設定）';
        const wds = new Set(rules.map((r) => r.byday));
        if (wds.size === 1) return `毎月 ${rules.map((r) => nthLabel(r.nth)).join('・')} ${wdLabel(rules[0].byday)}曜日`;
        return `毎月 ${rules.map((r) => nthLabel(r.nth) + wdLabel(r.byday) + '曜').join('・')}`;
      }
      function fmtDate(d) {
        return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
      }
      // 隔週の起点候補: 指定曜日の直近の日付を count 個（今日以降）
      function nextWeekdayDates(code, count) {
        const idx = WEEKDAYS.findIndex((w) => w[0] === code);
        const out = []; const base = new Date(); base.setHours(0, 0, 0, 0);
        for (let i = 0; i < 90 && out.length < count; i++) {
          const t = new Date(base); t.setDate(base.getDate() + i);
          if (t.getDay() === idx) out.push(fmtDate(t));
        }
        return out;
      }
      // ----- 単発の複数候補（日付ごとに時刻を複数）-----
      // 1グループ = 1日付 + 複数時刻。内部は {date,time} スロットにフラット化して送る。
      function timeRowHtml(time) {
        return `<span class="timechip"><input type="time" class="slotTime" value="${esc(time || '21:00')}" aria-label="時刻" />
          <button type="button" class="btn xs ghost" data-rmtime aria-label="この時刻を削除">×</button></span>`;
      }
      function slotGroupHtml(date, times) {
        const d = (date || '').replace(/\//g, '-');
        const ts = (times && times.length) ? times : ['21:00'];
        return `<div class="slotgroup" data-group>
          <div class="slotgroup-head">
            <input type="date" class="slotDate" value="${esc(d)}" aria-label="候補日" />
            <button type="button" class="btn sm ghost" data-rmdate>この日を削除</button>
          </div>
          <div class="timechips" data-times>${ts.map(timeRowHtml).join('')}</div>
          <button type="button" class="btn xs secondary" data-addtime>＋ 時刻を追加</button>
        </div>`;
      }
      function bindSlotControls() {
        const box = $('#nOneoffDates'); if (!box) return;
        box.querySelectorAll('.slotDate, .slotTime').forEach((inp) => { inp.onchange = syncNotifUI; });
        box.querySelectorAll('[data-rmdate]').forEach((b) => {
          b.onclick = () => {
            const groups = box.querySelectorAll('[data-group]');
            if (groups.length <= 1) { b.closest('[data-group]').querySelector('.slotDate').value = ''; }
            else b.closest('[data-group]').remove();
            syncNotifUI();
          };
        });
        box.querySelectorAll('[data-addtime]').forEach((b) => {
          b.onclick = () => {
            b.closest('[data-group]').querySelector('[data-times]').insertAdjacentHTML('beforeend', timeRowHtml('21:00'));
            bindSlotControls(); syncNotifUI();
          };
        });
        box.querySelectorAll('[data-rmtime]').forEach((b) => {
          b.onclick = () => {
            const wrap = b.closest('[data-times]');
            if (wrap.querySelectorAll('.timechip').length > 1) { b.closest('.timechip').remove(); syncNotifUI(); }
            else toast('最後の時刻は削除できません。日付ごと不要なら「この日を削除」を使ってください', true);
          };
        });
      }
      function renderOneoffSlots(groups) {
        const box = $('#nOneoffDates'); if (!box) return;
        const list = (groups && groups.length) ? groups : [{ date: '', times: ['21:00'] }];
        box.innerHTML = list.map((g) => slotGroupHtml(g.date, g.times)).join('');
        bindSlotControls();
      }
      function addOneoffGroup() {
        const box = $('#nOneoffDates'); if (!box) return;
        box.insertAdjacentHTML('beforeend', slotGroupHtml('', ['21:00']));
        bindSlotControls(); syncNotifUI();
      }
      /** 全グループを {date,time} スロットにフラット化（重複/未入力はそのまま、整形はサーバ側）。 */
      function getOneoffSlots() {
        const box = $('#nOneoffDates'); if (!box) return [];
        const out = [];
        box.querySelectorAll('[data-group]').forEach((g) => {
          const date = (g.querySelector('.slotDate').value || '').replace(/-/g, '/').trim();
          if (!date) return;
          g.querySelectorAll('.slotTime').forEach((t) => {
            const time = (t.value || '').trim();
            if (time) out.push({ date, time });
          });
        });
        return out;
      }

      // 開始時刻＋開催時間(分) を From-To 文字列に（サーバ src/lib/date.ts formatTimeRange と同等）
      function addMinsToTime(time, minutes) {
        const [h, m] = (time || '0:0').split(':').map(Number);
        const total = (h || 0) * 60 + (m || 0) + minutes;
        const wrapped = ((total % 1440) + 1440) % 1440;
        const hh = String(Math.floor(wrapped / 60)).padStart(2, '0');
        const mm = String(wrapped % 60).padStart(2, '0');
        return { time: `${hh}:${mm}`, nextDay: total >= 1440 || total < 0 };
      }
      function fmtTimeRange(start, dur) {
        if (!dur || dur <= 0) return `${start}〜`;
        const e = addMinsToTime(start, dur);
        return `${start}〜${e.nextDay ? '翌' : ''}${e.time}`;
      }
      function durValue() {
        const v = ($('#nDuration') && $('#nDuration').value.trim()) || '';
        return v === '' ? null : Number(v);
      }

      function scheduleSummary() {
        const t = ($('#nStartTime').value || '21:00');
        const dur = durValue();
        if ($('#nType').value === 'oneoff') {
          const slots = getOneoffSlots();
          if (!slots.length) return '候補（日付＋時刻）を1つ以上追加してください';
          const days = new Set(slots.map((s) => s.date)).size;
          return `候補 ${slots.length}枠（${days}日）` + (dur ? `・各${dur}分` : '');
        }
        const wd = wdLabel($('#nWeekday').value), mode = $('#nMode').value, tr = fmtTimeRange(t, dur);
        if (mode === 'weekly') return `毎週 ${wd}曜日 ${tr}`;
        if (mode === 'biweekly') return `隔週 ${wd}曜日 ${tr}（次回 ${$('#nNext').value || '—'}）`;
        return `${humanMonthly(getMonthlyRules())} ${tr}`;
      }

      // ================= 通知 =================
      let cacheChannels = [], cacheSegments = [], cacheNotifs = [];
      async function loadNotifications() {
        const g = guild.id;
        let segs = [], notifs = [], channels = [];
        try {
          [segs, notifs, channels] = await Promise.all([
            api('/segments?guild_id=' + encodeURIComponent(g)),
            api('/notifications?guild_id=' + encodeURIComponent(g)),
            api('/guilds/' + g + '/channels').catch(() => []),
          ]);
        } catch (e) { toast(e.message, true); }
        cacheSegments = segs; cacheNotifs = notifs; cacheChannels = channels;
        const segName = (id) => { const s = segs.find((x) => x.id === id); return s ? s.name : '?'; };
        const chName = (id) => { const c = channels.find((x) => x.id === id); return c ? '#' + c.name : id; };

        const oneoffSched = (n) => {
          const earliest = `${esc(n.one_off_date || '')}${n.start_time ? ' ' + esc(fmtTimeRange(n.start_time, n.duration_minutes)) : ''}`;
          if (n.decided_occurrence_id && n.decided_date) {
            return `単発・確定 ${esc(n.decided_date)}${n.decided_time ? ' ' + esc(fmtTimeRange(n.decided_time, n.duration_minutes)) : ''}`;
          }
          if ((n.candidate_count || 0) > 1) return `単発・調整中（候補${n.candidate_count}件・最早 ${earliest}）`;
          return `単発 ${earliest}`;
        };
        const rows = notifs.map((n) => {
          const sched = n.type === 'oneoff'
            ? oneoffSched(n)
            : esc(humanRRule(n.rrule, n.start_time, n.duration_minutes));
          return `<div class="listrow">
            <div><div style="font-weight:600">${esc(n.name)}</div>
              <div class="muted" style="font-size:12px;margin-top:2px">
                <span class="pill">${esc(segName(n.segment_id))}</span>
                ${sched} ・ ${esc(chName(n.channel_id))}</div></div>
            <div class="actions">
              <span class="pill ${n.active ? 'on' : 'off'}">${n.active ? '有効' : '無効'}</span>
              <button class="btn sm secondary" data-nrecruit="${n.id}">📣 募集</button>
              <button class="btn sm secondary" data-nedit="${n.id}">編集</button>
              <button class="btn sm ghost" data-nocc="${n.id}">開催回</button>
              <button class="btn sm danger" data-ndel="${n.id}">削除</button>

        }).join('');

        $('#sec-notifications').innerHTML = `<h2>通知 (${notifs.length})</h2>
          ${notifs.length ? rows : '<div class="empty">まだ通知がありません。<br>下のフォームから最初の通知を作成しましょう。</div>'}
          <dialog class="modal-lg" id="occDialog" aria-labelledby="occTitle">
            <div class="modal-head"><h3 id="occTitle">開催回</h3>
              <button type="button" class="modal-close" data-occ-close aria-label="閉じる">✕</button></div>
            <div class="modal-body" id="occBox"></div>
            <div class="modal-foot"><button type="button" class="btn ghost" data-occ-close>閉じる</button></div>
          </dialog>
          ${segs.length ? notifForm() : '<p class="muted" style="margin-top:16px">※ 先に「メンバー区分」を作成してください（通知の対象になります）。</p>'}`;

        if (segs.length) { bindNotifForm(); }
        document.querySelectorAll('[data-nedit]').forEach((b) => {
          b.onclick = () => fillNotifForm(cacheNotifs.find((x) => x.id === Number(b.dataset.nedit)));
        });
        document.querySelectorAll('[data-nocc]').forEach((b) => {
          b.onclick = () => loadOccurrences(Number(b.dataset.nocc));
        });
        document.querySelectorAll('#occDialog [data-occ-close]').forEach((b) => { b.onclick = () => $('#occDialog').close(); });
        document.querySelectorAll('[data-nrecruit]').forEach((b) => {
          b.onclick = async () => {
            if (!(await confirmDialog('この通知の募集メッセージをチャンネルへ投稿します。', { okLabel: '送信する' }))) return;
            await withBusy(b, async () => {
              try { const r = await api('/notifications/' + b.dataset.nrecruit + '/recruit', { method: 'POST' });
                toast(r && r.message ? r.message : '募集を送信しました'); }
              catch (e) { toast(e.message, true); }
            });
          };
        });
        document.querySelectorAll('[data-ndel]').forEach((b) => {
          b.onclick = async () => {
            if (!(await confirmDialog('この通知を、配下の開催回・回答ごとすべて削除します。元に戻せません。', { danger: true, okLabel: '削除' }))) return;
            try { await api('/notifications/' + b.dataset.ndel, { method: 'DELETE' }); toast('削除しました'); loadNotifications(); }
            catch (e) { toast(e.message, true); }
          };
        });
      }

      function humanRRule(rrule, time, dur) {
        const b = parseRRuleToBuilder(rrule);
        const wd = wdLabel(b.byday), tr = fmtTimeRange(time || '', dur);
        if (b.mode === 'weekly') return `毎週 ${wd}曜日 ${tr}`;
        if (b.mode === 'biweekly') return `隔週 ${wd}曜日 ${tr}`;
        return `${humanMonthly(b.rules)} ${tr}`;
      }

      function notifForm() {
        const segOpts = cacheSegments.map((s) => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
        const chOpts = cacheChannels.length
          ? cacheChannels.map((c) => `<option value="${esc(c.id)}">#${esc(c.name)}</option>`).join('')
          : '<option value="">（チャンネルを取得できませんでした）</option>';
        const wdOpts = WEEKDAYS.map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
        return `<fieldset><legend id="nFormTitle">新規通知</legend>
          <input type="hidden" id="nId" value="" />
          <div class="row">
            <div><label>名前</label><input id="nName" placeholder="例: 土曜定例・キャスト出欠" /></div>
            <div><label>投稿チャンネル</label><select id="nChannel">${chOpts}</select></div>
          </div>
          <div class="row">
            <div><label>対象区分（メンバー区分）</label><select id="nSegment">${segOpts}</select></div>
            <div><label>開催時間（分）<span class="muted">（任意・空欄で開始時刻のみ表示）</span></label>

          </div>
